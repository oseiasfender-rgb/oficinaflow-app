<style>

.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}.card{background:#fffaf4;border:1px solid var(--line);border-radius:13px;padding:15px;box-shadow:0 2px 10px rgba(150,80,20,.07)}

input,select,textarea{border:1px solid #dcb990;background:#fffaf4;border-radius:7px;padding:9px;width:100%;margin:4px 0 10px}label{font-size:12px;color:#76533a;font-weight:700}

</head><body><header class="top"><div class="logo">OS</div><div class="brand"><b>OFICINAOS</b><small>Gestão Inteligente</small></div><nav class="nav"><a class="" href="index.html">Painel</a><a class="" href="orcamento.html">Orçamento</a><a class="" href="financeiro.html">Financeiro</a><a class="" href="agenda.html">Agenda</a><a class="" href="clientes.html">Clientes</a><a class="" href="relatorios.html">Relatórios</a><a class="" href="metas.html">Metas</a><a class="" href="ia.html">IA</a><a class="" href="configuracoes.html">Configurações</a><a class="active" href="auditoria.html">Auditoria</a><a href="alertas.html">Alertas</a><a href="busca.html">Busca</a><a href="preferencias.html">Preferências</a><a href="dashboard-operacional.html">Operacional</a><a href="fotos-os.html">Fotos OS</a></nav><div class="actions"><label>Importar<input id="v547Import" type="file" accept=".json,application/json" style="display:none"></label><button id="v547Backup" class="primary">Backup</button></div></header><main class="main">
<section class="hero"><div><h1>Auditoria Operacional</h1><p>Histórico de eventos importantes do sistema.</p></div><button class="primary" id="atualizar">Atualizar</button></section>
<section class="grid">
<div class="card"><h3>Total</h3><strong id="total">0</strong></div>
<div class="card"><h3>Último evento</h3><strong id="ultimo">—</strong></div>
<div class="card"><h3>Módulos</h3><strong id="modulos">0</strong></div>
</section>
<section class="card" style="margin-top:12px">
<label>Filtro</label><input id="filtro" placeholder="cliente, conta, backup, financeiro...">
<table class="table" id="tabela"></table>
</section>
</main><script src="oficinaos-v547-idb-core.js?v=54730"></script><script>
let logs=[];
async function render(){
 logs=await OficinaOS.listarAuditoria(500);
 const term=(filtro.value||'').toLowerCase();
 const rows=logs.filter(x=>JSON.stringify(x).toLowerCase().includes(term));
 total.textContent=logs.length;
 ultimo.textContent=logs[0]?new Date(logs[0].data).toLocaleString('pt-BR'):'—';
 modulos.textContent=[...new Set(logs.map(x=>x.modulo))].length;
 tabela.innerHTML='<tr><th>Data</th><th>Módulo</th><th>Evento</th><th>Detalhes</th></tr>'+rows.map(x=>'<tr><td>'+new Date(x.data).toLocaleString('pt-BR')+'</td><td>'+x.modulo+'</td><td><b>'+x.evento+'</b></td><td>'+String(x.detalhes||'')+'</td></tr>').join('');
}
filtro.oninput=render;
atualizar.onclick=render;
render();
</script><div class="footer-v54729"></div>
