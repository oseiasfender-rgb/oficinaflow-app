d><td><button onclick="editCliente(\''+c.id+'\')">Editar</button></td></tr>').join('');}window.editCliente=id=>{const c=clientes.find(x=>x.id===id);if(!c)return;editing=id;formTitle.textContent='Editar cliente';nome.value=c.nome||'';telefone.value=c.telefone||c.whatsapp||'';email.value=c.email||'';doc.value=c.cpfCnpj||c.cpf||'';status.value=c.status||'Ativo';obs.value=c.obs||'';};novo.onclick=()=>{editing=null;formTitle.textContent='Novo cliente';['nome','telefone','email','doc','obs'].forEach(id=>document.getElementById(id).value='');status.value='Ativo';};salvar.onclick=async()=>{await OficinaOS.saveCliente({id:editing||undefined,nome:nome.value,telefone:telefone.value,whatsapp:telefone.value,email:email.value,cpfCnpj:doc.value,status:status.value,obs:obs.value});editing=null;await loadData();};salvarVeiculo.onclick=async()=>{await OficinaOS.saveVeiculo({clienteId:clienteVeiculo.value,placa:placa.value.toUpperCase(),modelo:modelo.value,marca:marca.value,ano:ano.value});placa.value=modelo.value=marca.value=ano.value='';await loadData();};q.oninput=draw;loadData();</script></body></html>
