<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Orçamento</title><link rel="manifest" href="manifest.webmanifest"><style>
:root{--bg:#fbf7f1;--panel:#fffaf4;--card:#fff;--line:#ead7c4;--brown:#a95510;--green:#087e3d;--red:#b91c1c;--blue:#1d4ed8;--muted:#7b6049}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:#24160d;font:14px Arial,sans-serif}
.top{min-height:58px;background:var(--panel);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;padding:8px 14px;position:sticky;top:0;z-index:20}
.logo{background:var(--brown);color:white;padding:8px;border-radius:6px;font-weight:900}.brand b{letter-spacing:4px}.brand small{display:block;color:#9b5a22;letter-spacing:2px;font-size:8px}
.nav{display:flex;gap:4px;flex-wrap:wrap;margin-left:auto}.btn,.nav a{border:1px solid #dcb990;background:#fffaf4;border-radius:7px;padding:8px 10px;font-weight:700;text-decoration:none;color:#24160d;cursor:pointer}.primary{background:var(--brown)!important;color:#fff!important}.green{background:#e8fff1!important;color:var(--green)!important}.red{background:#ffecec!important;color:var(--red)!important}.blue{background:#eff6ff!important;color:var(--blue)!important}
.main{padding:18px}.panel{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:14px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:10px}.card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:12px}.card small{display:block;color:var(--muted);letter-spacing:1px;font-size:10px}.card strong{display:block;font-size:22px;margin-top:4px}
input,select,textarea{width:100%;padding:10px;border:1px solid #dcb990;border-radius:8px;background:white;margin:4px 0 10px}label{font-size:11px;font-weight:900;letter-spacing:1px;color:#6b4d35}table{width:100%;border-collapse:collapse;background:white;border-radius:10px;overflow:hidden}td,th{border-bottom:1px solid var(--line);padding:9px;text-align:left}th{background:#fff2e6}.ok{color:var(--green)}.bad{color:var(--red)}.muted{color:var(--muted)}pre{white-space:pre-wrap;background:#21160f;color:#fff7ef;border-radius:8px;padding:12px;max-height:360px;overflow:auto}.status{position:fixed;right:10px;bottom:10px;background:var(--panel);border:1px solid var(--line);border-radius:999px;padding:7px 10px;color:#7b6049;font-size:12px}
</style></head><body><header class="top"><div class="logo">OS</div><div class="brand"><b>OFICINAOS</b><small>V546.32 REAL CORE</small></div><div class="nav">
<a href="index.html">Painel</a><a href="orcamento.html">Orçamento</a><a href="financeiro.html">Financeiro</a><a href="agenda.html">Agenda</a><a href="clientes.html">Clientes</a><a href="relatorios.html">Relatórios</a><a href="metas.html">Metas</a><a href="ia.html">IA</a><a href="diagnostico.html">Diagnóstico</a>
</div></header><main class="main">
<section class="panel"><h2>Orçamento — real</h2><div class="grid"><div><label>Cliente</label><input id="cliente"></div><div><label>Veículo</label><input id="veiculo"></div><div><label>Serviço</label><input id="servico"></div><div><label>Total R$</label><input id="valor"></div></div><button class="btn primary" onclick="criar()">Salvar orçamento</button></section><section class="panel"><table><thead><tr><th>Cliente</th><th>Veículo</th><th>Serviço</th><th>Status</th><th>Valor</th><th>Ação</th></tr></thead><tbody id="rows"></tbody></table></section>
</main><div class="status" id="status">Local</div><script src="oficinaos-state.js?v=54632"></script><script>
function render(){const s=OSCORE.load();rows.innerHTML=s.orcamentos.map(o=>'<tr><td>'+o.cliente+'</td><td>'+o.veiculo+'</td><td>'+o.servico+'</td><td>'+o.status+'</td><td>'+OSCORE.money(o.valor)+'</td><td><button class=btn onclick="aprovar(\''+o.id+'\')">Aprovar</button></td></tr>').join('');OSCORE.status('Orçamentos reais')}
function criar(){OSCORE.addOrcamento({cliente:cliente.value,veiculo:veiculo.value,servico:servico.value,valor:valor.value});render()}
function aprovar(id){OSCORE.aprovarOrcamento(id);render();alert('Orçamento aprovado: criado no Financeiro e Agenda.')}
render();
</script></body></html>
