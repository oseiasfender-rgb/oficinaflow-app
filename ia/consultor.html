<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>OficinaOS — IA Consultor</title>
<style>
body{font-family:Arial,sans-serif;background:#f8f6f3;color:#23180f;margin:0;padding:24px}.wrap{max-width:1100px;margin:auto}.card{background:white;border:1px solid #e8dccf;border-radius:18px;padding:18px;box-shadow:0 8px 22px rgba(0,0,0,.06);margin-bottom:16px}button,input{padding:12px;border-radius:12px;border:1px solid #d6c8b8;margin:4px}button{background:#111827;color:white;cursor:pointer}input{width:calc(100% - 32px)}pre{background:#111827;color:#f8f6f3;padding:16px;border-radius:14px;white-space:pre-wrap;overflow:auto;max-height:620px}.badge{display:inline-block;background:#efe0cf;border:1px solid #d7b990;border-radius:999px;padding:4px 10px;margin:2px}
</style></head><body><div class="wrap">
<h1>IA Consultor — Manual OficinaOS</h1>
<p><span class="badge">Manual interno</span><span class="badge">FAQ</span><span class="badge">Diagnóstico</span><span class="badge">Passo a passo</span></p>
<div class="card"><input id="q" placeholder="Pergunte: como fazer backup, gerar PDF, cadastrar cliente...">
<button onclick="show(IAConsultor.answer(document.getElementById('q').value))">Consultar</button>
<button onclick="show(IAConsultor.diagnose())">Diagnóstico</button>
<button onclick="show(IAConsultor.quickStart())">Primeiro Uso</button>
<button onclick="show(IAConsultor.faq())">FAQ</button>
<button onclick="show(IAConsultor.topics())">Tópicos</button></div>
<div class="card"><h2>Atalhos</h2>
<button onclick="show(IAConsultor.section('orcamento'))">Orçamento</button>
<button onclick="show(IAConsultor.section('pdf_premium'))">PDF Premium</button>
<button onclick="show(IAConsultor.section('backup'))">Backup</button>
<button onclick="show(IAConsultor.section('financeiro'))">Financeiro</button>
<button onclick="show(IAConsultor.section('agenda'))">Agenda</button>
<button onclick="show(IAConsultor.section('erros'))">Erros comuns</button></div>
<pre id="out">Aguardando pergunta...</pre></div>
<script src="../core/storage-adapter.js"></script><script src="../core/clean-start.js"></script><script src="../core/autosave-smart-backup.js"></script><script src="../core/admin-shell.js"></script><script src="../core/tab-fusion-excellence.js"></script><script src="../core/first-run-wizard.js"></script><script src="../core/browser-runtime-qa.js"></script><script src="../core/pdf-premium-qa.js"></script><script src="../core/ia-consultant-manual.js"></script>
<script>function show(x){document.getElementById('out').textContent=typeof x==='string'?x:JSON.stringify(x,null,2)}</script>
</body></html>
