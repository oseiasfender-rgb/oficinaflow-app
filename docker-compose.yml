services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: oficinaos
      POSTGRES_PASSWORD: oficinaos
      POSTGRES_DB: oficinaos
    ports: ["127.0.0.1:5432:5432"]
    volumes: ["postgres_data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oficinaos -d oficinaos"]
      interval: 5s
      timeout: 5s
      retries: 20
  redis:
    image: redis:7-alpine
    ports: ["127.0.0.1:6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      NODE_ENV: development
      PORT: 3001
      APP_VERSION: 1000.100.2
      DATABASE_URL: postgresql://oficinaos:oficinaos@postgres:5432/oficinaos?schema=public
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: dev-only-access-secret-change-before-prod-123456789
      JWT_REFRESH_SECRET: dev-only-refresh-secret-change-before-prod-123456789
      CORS_ORIGINS: http://localhost:5173
    ports: ["3001:3001"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://oficinaos:oficinaos@postgres:5432/oficinaos?schema=public
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      VITE_API_URL: http://localhost:3001
    ports: ["5173:8080"]
    depends_on: [api]
volumes:
  postgres_data:
