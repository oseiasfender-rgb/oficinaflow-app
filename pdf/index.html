<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>OficinaOS V551.37 — PDF Premium QA</title>
<style>
body{font-family:Arial,sans-serif;background:#f8f6f3;color:#23180f;margin:0;padding:24px}
.wrap{max-width:1100px;margin:auto}.card{background:white;border:1px solid #e8dccf;border-radius:18px;padding:18px;box-shadow:0 8px 22px rgba(0,0,0,.06);margin-bottom:16px}
button{padding:12px 16px;border-radius:12px;border:0;background:#111827;color:white;cursor:pointer;margin:4px}
pre{background:#111827;color:#f8f6f3;padding:16px;border-radius:14px;white-space:pre-wrap;overflow:auto;max-height:620px}
.badge{display:inline-block;background:#efe0cf;border:1px solid #d7b990;border-radius:999px;padding:4px 10px;margin:2px}
</style>
</head>
<body>
<div class="wrap">
<h1>OficinaOS V551.37 — PDF Premium Final Verification</h1>
<div class="card">
<p><span class="badge">Limaprata</span><span class="badge">Orçamento Premium</span><span class="badge">Garantia</span><span class="badge">Assinatura</span><span class="badge">Visual Profissional</span></p>
<p>Use esta tela para validar o PDF/orçamento premium antes do primeiro uso real.</p>
<button onclick="show(PDFPremiumQA.run())">Rodar QA automático</button>
<button onclick="PDFPremiumQA.openPreview()">Abrir Preview Premium</button>
<button onclick="show(PDFPremiumQA.checklist())">Checklist manual</button>
<button onclick="show(PDFPremiumQA.summary())">Resumo</button>
</div>
<pre id="out">Aguardando...</pre>
</div>
<script src="../core/storage-adapter.js"></script>
<script src="../core/clean-start.js"></script>
<script src="../core/autosave-smart-backup.js"></script>
<script src="../core/first-run-wizard.js"></script>
<script src="../core/pdf-premium-qa.js"></script>
<script>
function show(x){document.getElementById('out').textContent=typeof x==='string'?x:JSON.stringify(x,null,2)}
</script>
</body>
</html>
