<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Diagnóstico</title><link rel="manifest" href="manifest.webmanifest"><style>
:root{--bg:#fbf7f1;--panel:#fffaf4;--card:#fff;--line:#ead7c4;--brown:#a95510;--green:#087e3d;--red:#b91c1c;--blue:#1d4ed8;--muted:#7b6049}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:#24160d;font:14px Arial,sans-serif}
.top{min-height:58px;background:var(--panel);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;padding:8px 14px;position:sticky;top:0;z-index:20}

input,select,textarea{width:100%;padding:10px;border:1px solid #dcb990;border-radius:8px;background:white;margin:4px 0 10px}label{font-size:11px;font-weight:900;letter-spacing:1px;color:#6b4d35}table{width:100%;border-collapse:collapse;background:white;border-radius:10px;overflow:hidden}td,th{border-bottom:1px solid var(--line);padding:9px;text-align:left}th{background:#fff2e6}.ok{color:var(--green)}.bad{color:var(--red)}.muted{color:var(--muted)}pre{white-space:pre-wrap;background:#21160f;color:#fff7ef;border-radius:8px;padding:12px;max-height:360px;overflow:auto}.status{position:fixed;right:10px;bottom:10px;background:var(--panel);border:1px solid var(--line);border-radius:999px;padding:7px 10px;color:#7b6049;font-size:12px}
