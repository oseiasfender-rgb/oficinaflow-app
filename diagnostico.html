<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>OficinaOS V546.25 — Diagnóstico de Integrações</title>
<style>
:root{--line:#ead7c4;--brown:#a95510;--green:#0aa34f;--red:#d93232;--orange:#e28a1a;--muted:#7b6049}
*{box-sizing:border-box}
body{margin:0;min-height:100vh;background:linear-gradient(135deg,#fbf7f1,#f2eadf);font:13px Arial;color:#24160d}
.top{min-height:58px;background:#fffaf4;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;padding:8px 14px;box-shadow:0 2px 10px #0001;flex-wrap:wrap}
.logo{background:var(--brown);color:#fff;padding:8px;border-radius:5px;font-weight:900}
.brand b{letter-spacing:4px;font-size:16px}.brand small{display:block;color:#9b5a22;letter-spacing:2px;font-size:8px}
.main{padding:18px}.panel{background:#fffaf4;border:1px solid var(--line);border-radius:10px;padding:18px;margin-bottom:14px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:12px}
.card{background:#fff;border:1px solid var(--line);border-radius:10px;padding:14px;box-shadow:0 2px 8px #00000008}
.card b{display:block;font-size:16px;margin-bottom:8px}.card small{display:block;color:var(--muted);margin-top:6px}
.ok{color:var(--green)}.bad{color:var(--red)}.warn{color:var(--orange)}
.btn{border:1px solid #dcb990;background:#fffaf4;border-radius:5px;padding:8px 10px;cursor:pointer;font-weight:700;text-decoration:none;color:#24160d;display:inline-block}
.btn.primary{background:var(--brown);color:#fff}.btn.red{background:#ffecec;color:#b50f17}.btn.green{background:#e8fff1;color:#087e3d}
pre{white-space:pre-wrap;background:#21160f;color:#fff7ef;border-radius:8px;padding:12px;max-height:360px;overflow:auto}
table{width:100%;border-collapse:collapse;background:#fff;border:1px solid var(--line);border-radius:8px;overflow:hidden}
td,th{border-bottom:1px solid var(--line);padding:8px;text-align:left}
th{background:#fff2e6}
.tools{margin-left:auto;display:flex;gap:6px;flex-wrap:wrap}
</style>
</head>
<body>
<header class="top">
  <div class="logo">OS</div>
  <div class="brand"><b>OFICINAOS</b><small>DIAGNÓSTICO DE INTEGRAÇÕES</small></div>
  <div class="tools">
    <a class="btn" href="index.html">Painel</a>
    <button class="btn green" onclick="rodarDiagnostico()">Recarregar diagnóstico</button>
    <button class="btn" onclick="exportarDiagnostico()">Exportar diagnóstico</button>
    <button class="btn red" onclick="limparStateTeste()">Limpar STATE de teste</button>
  </div>
</header>

<main class="main">
<section class="panel">
<h2>OficinaOS V546.25 — Diagnóstico do STATE Real</h2>
<p>Esta tela verifica se as integrações reais estão gravando dados no STATE central. Ela não altera as abas.</p>
<div class="grid" id="cards"></div>
</section>

<section class="panel">
<h3>Checklist das 10 Integrações</h3>
<table>
<thead><tr><th>Integração</th><th>Status</th><th>Como validar</th></tr></thead>
<tbody id="checklist"></tbody>
</table>
</section>

<section class="panel">
<h3>Resumo técnico do STATE</h3>
<pre id="raw"></pre>
</section>
</main>

<script src="oficinaos-state.js"></script>
<script>
function jget(k,f){try{return JSON.parse(localStorage.getItem(k)||'')}catch(e){return f}}
function moeda(v){return Number(v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}
function getState(){
  if(window.OFICINAOS_STATE_LAYER && window.OFICINAOS_STATE_LAYER.loadState){
    return window.OFICINAOS_STATE_LAYER.loadState();
  }
  return jget('OFICINAOS_STATE_V546_22',null)||jget('OFICINAOS_STATE',null)||jget('STATE',{});
}
function calc(){
  const s=getState();
  const fin=s.financeiro||{};
  const lanc=fin.lancamentos||[];
  const receitas=(fin.receitas||lanc.filter(x=>x.tipo==='receita'));
  const despesas=(fin.despesas||lanc.filter(x=>x.tipo==='despesa'));
  const rec=receitas.reduce((a,b)=>a+Number(b.valor||b.val||0),0);
  const dep=despesas.reduce((a,b)=>a+Number(b.valor||b.val||0),0);
  const os=s.agenda||[];
  const entregues=os.filter(x=>String(x.status||'').toLowerCase().includes('entreg')).length;
  return {s,lanc,receitas,despesas,rec,dep,os,entregues};
}
function status(ok,warn=false){return ok?'<b class="ok">OK</b>':(warn?'<b class="warn">Pendente</b>':'<b class="bad">Não validado</b>')}
function card(t,v,d,cls=''){
  return '<div class="card"><b>'+t+'</b><strong class="'+cls+'">'+v+'</strong><small>'+d+'</small></div>'
}
function rodarDiagnostico(){
  const c=calc(), s=c.s;
  cards.innerHTML =
    card('Clientes', (s.clientes||[]).length, 'STATE.clientes')+
    card('Veículos', (s.veiculos||[]).length, 'STATE.veiculos')+
    card('Orçamentos', (s.orcamentos||[]).length, 'STATE.orcamentos')+
    card('Agenda / OS', (s.agenda||[]).length, 'STATE.agenda')+
    card('Receitas', moeda(c.rec), 'STATE.financeiro.receitas','ok')+
    card('Despesas', moeda(c.dep), 'STATE.financeiro.despesas','bad')+
    card('Resultado', moeda(c.rec-c.dep), 'Receitas - despesas')+
    card('OS Entregues', c.entregues, 'Agenda entregue')+
    card('Metas Realizado', s.metas&&s.metas.realizado?'OK':'Pendente', 'STATE.metas.realizado', s.metas&&s.metas.realizado?'ok':'warn')+
    card('IA Contexto', s.ia&&s.ia.contexto&&s.ia.contexto.length?'OK':'Pendente', 'STATE.ia.contexto', s.ia&&s.ia.contexto&&s.ia.contexto.length?'ok':'warn');

  const checks=[
    ['Clientes → Orçamento', (s.clientes||[]).length>0 && localStorage.getItem('OFICINAOS_DRAFT_ORCAMENTO'), 'No CRM, clique Cliente → Orçamento.'],
    ['Orçamento → Financeiro', c.receitas.some(x=>x.origem==='orcamento'), 'No Orçamento, clique Aprovar → Financeiro + Agenda.'],
    ['Orçamento → Agenda', c.os.some(x=>x.origem==='orcamento'), 'A aprovação deve criar OS.'],
    ['Agenda → Financeiro', c.receitas.some(x=>x.origem==='agenda'||x.agendaId), 'Na Agenda, clique Entregar → Financeiro.'],
    ['Agenda → Clientes', (s.clientes||[]).some(x=>x.historico&&x.historico.length), 'Histórico do cliente deve receber OS/fotos.'],
    ['Financeiro → Relatórios', !!(s.relatorios&&s.relatorios.ultimoResumo), 'Abrir Relatórios ou clicar STATE.'],
    ['Financeiro → Metas', !!(s.metas&&s.metas.realizado), 'Abrir Metas ou clicar STATE.'],
    ['Clientes → Financeiro', c.receitas.some(x=>x.clienteId), 'Receitas novas devem ter clienteId.'],
    ['Orçamento/Agenda → Relatórios', !!(s.relatorios&&s.relatorios.ultimoResumo&&s.relatorios.ultimoResumo.osTotal!==undefined), 'Resumo deve conter OS e entregues.'],
    ['IA → Consulta', !!(s.ia&&s.ia.contexto&&s.ia.contexto.length), 'IA deve consultar o contexto, sem alterar dados.']
  ];
  checklist.innerHTML=checks.map(x=>'<tr><td>'+x[0]+'</td><td>'+status(x[1],true)+'</td><td>'+x[2]+'</td></tr>').join('');
  raw.textContent=JSON.stringify(s,null,2);
}
function exportarDiagnostico(){
  const blob=new Blob([raw.textContent||JSON.stringify(getState(),null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='oficinaos_diagnostico_state_v546_22_3.json';
  a.click();
  URL.revokeObjectURL(a.href);
}
function limparStateTeste(){
  if(prompt('Digite LIMPAR para remover STATE de teste')!=='LIMPAR')return;
  ['OFICINAOS_STATE_V546_22','OFICINAOS_STATE','STATE','oficinaos_state','ALL_TX','oficinaos_ALL_TX','oficinaos_financeiro_lancamentos','OFICINAOS_DRAFT_ORCAMENTO'].forEach(k=>localStorage.removeItem(k));
  rodarDiagnostico();
}
rodarDiagnostico();
</script>
</body>
</html>
