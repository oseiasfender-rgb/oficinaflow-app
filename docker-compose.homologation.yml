services:
  postgres-test:
    image: postgres:16-alpine
    environment: { POSTGRES_DB: oficinaos_test, POSTGRES_USER: oficinaos, POSTGRES_PASSWORD: homologation-only }
    ports: ["127.0.0.1:55432:5432"]
    healthcheck: { test: ["CMD-SHELL", "pg_isready -U oficinaos -d oficinaos_test"], interval: 5s, timeout: 3s, retries: 20 }
  redis-test:
    image: redis:7-alpine
    ports: ["127.0.0.1:56379:6379"]
    healthcheck: { test: ["CMD", "redis-cli", "ping"], interval: 5s, timeout: 3s, retries: 20 }
