services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks: [backend]
    read_only: true
    tmpfs: [/tmp]
    security_opt: [no-new-privileges:true]
  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks: [backend]
    read_only: true
    tmpfs: [/tmp]
    security_opt: [no-new-privileges:true]
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    networks: [frontend]
    read_only: true
    tmpfs: [/var/cache/nginx,/var/run]
    security_opt: [no-new-privileges:true]
  proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports: ["80:80"]
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on: [api, web]
    networks: [frontend, backend]
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: oficinaos
      POSTGRES_USER: oficinaos
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets: [postgres_password]
    volumes: [postgres_data:/var/lib/postgresql/data]
    healthcheck: { test: ["CMD-SHELL", "pg_isready -U oficinaos"], interval: 10s, timeout: 5s, retries: 10 }
    networks: [backend]
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server","--appendonly","yes"]
    volumes: [redis_data:/data]
    healthcheck: { test: ["CMD", "redis-cli", "ping"], interval: 10s, timeout: 5s, retries: 10 }
    networks: [backend]
  prometheus:
    image: prom/prometheus:v2.55.1
    volumes: ["./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro"]
    networks: [backend]
  grafana:
    image: grafana/grafana:11.3.1
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning:ro
    networks: [backend]
secrets:
  postgres_password:
    file: ./secrets/postgres_password.txt
networks:
  frontend: {}
  backend: { internal: true }
volumes:
  postgres_data: {}
  redis_data: {}
  grafana_data: {}
