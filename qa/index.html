<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>OficinaOS V551.36 — Browser Runtime QA</title>
<style>
body{font-family:Arial,sans-serif;background:#f8f6f3;color:#23180f;margin:0;padding:24px}
.wrap{max-width:1100px;margin:auto}.card{background:white;border:1px solid #e8dccf;border-radius:18px;padding:18px;box-shadow:0 8px 22px rgba(0,0,0,.06);margin-bottom:16px}
button{padding:12px 16px;border-radius:12px;border:0;background:#111827;color:white;cursor:pointer;margin:4px}
pre{background:#111827;color:#f8f6f3;padding:16px;border-radius:14px;white-space:pre-wrap;overflow:auto;max-height:620px}
.badge{display:inline-block;background:#efe0cf;border:1px solid #d7b990;border-radius:999px;padding:4px 10px;margin:2px}
</style>
</head>
<body>
<div class="wrap">
<h1>OficinaOS V551.36 — Browser Runtime QA</h1>
<div class="card">
<p><span class="badge">IndexedDB</span><span class="badge">AutoSave</span><span class="badge">Backup</span><span class="badge">Wizard</span><span class="badge">PWA</span><span class="badge">Cache</span><span class="badge">Admin</span></p>
<p>Rode esta tela no navegador real, de preferência no Chrome Desktop e no Android.</p>
<button onclick="runQA()">Rodar QA do Navegador</button>
<button onclick="show(BrowserRuntimeQA.summary())">Resumo</button>
<button onclick="show(BrowserRuntimeQA.checklist())">Checklist</button>
</div>
<pre id="out">Aguardando...</pre>
</div>
<script src="../core/storage-adapter.js"></script>
<script src="../core/clean-start.js"></script>
<script src="../core/autosave-smart-backup.js"></script>
<script src="../core/admin-shell.js"></script>
<script src="../core/tab-fusion-excellence.js"></script>
<script src="../core/first-run-wizard.js"></script>
<script src="../core/browser-runtime-qa.js"></script>
<script>
async function runQA(){try{show(await BrowserRuntimeQA.run())}catch(e){show({error:e.message})}}
function show(x){document.getElementById('out').textContent=typeof x==='string'?x:JSON.stringify(x,null,2)}
</script>
</body>
</html>
