<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OficinaFlow</title>

<style>
body { font-family: Arial; background:#f5f5f5; margin:0; }
header { background:#111; color:#fff; padding:15px; text-align:center; }
.container { padding:20px; }

.card {
  background:#fff;
  padding:15px;
  margin-bottom:15px;
  border-radius:8px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

button {
  padding:10px;
  border:none;
  background:#111;
  color:#fff;
  border-radius:5px;
  cursor:pointer;
}

input, select {
  width:100%;
  padding:8px;
  margin-bottom:10px;
}

.timeline span {
  display:inline-block;
  padding:5px 10px;
  margin:3px;
  background:#ddd;
  border-radius:5px;
}
</style>
</head>

<body>

<header>
<h2>OficinaFlow</h2>
</header>

<div class="container">

<div class="card">
<h3>Novo Orçamento</h3>

<input id="cliente" placeholder="Cliente">
<input id="veiculo" placeholder="Veículo">

<select id="complexidade">
<option>Básico</option>
<option>Médio</option>
<option>Alto</option>
</select>

<input id="horas" type="number" placeholder="Horas estimadas">
<input id="valorHora" type="number" placeholder="R$/hora">

<select id="processos" multiple>
<option>Desmontagem</option>
<option>Alinhamento</option>
<option>Funilaria</option>
<option>Recuperaçăo</option>
<option>Solda</option>
<option>Preparaçăo</option>
<option>Pintura parcial</option>
<option>Pintura total</option>
<option>Polimento técnico</option>
</select>

<button onclick="salvarOrcamento()">Salvar Orçamento</button>
<button onclick="virarOS()">Virar OS</button>

</div>

<div class="card">
<h3>Ordem de Serviço</h3>
<div id="osDetalhe"></div>
</div>

<div class="card">
<h3>Estoque</h3>

<input id="itemNome" placeholder="Nome peça/material">
<input id="itemQtd" type="number" placeholder="Quantidade">

<select id="condicao">
<option>Novo</option>
<option>Usado</option>
<option>Recuperado</option>
</select>

<button onclick="addEstoque()">Adicionar</button>

<ul id="listaEstoque"></ul>
</div>

</div>

<script>

let estoque = JSON.parse(localStorage.getItem('estoque')) || [];
let orcamento = null;

function salvarOrcamento(){
  const cliente = document.getElementById('cliente').value;
  const veiculo = document.getElementById('veiculo').value;
  const horas = Number(document.getElementById('horas').value);
  const valorHora = Number(document.getElementById('valorHora').value);

  const total = horas * valorHora;

  orcamento = { cliente, veiculo, horas, valorHora, total };

  alert("Orçamento salvo");
}

function virarOS(){
  if(!orcamento){
    alert("Crie um orçamento primeiro");
    return;
  }

  const el = document.getElementById('osDetalhe');

  el.innerHTML = `
    <b>Cliente:</b> ${orcamento.cliente}<br>
    <b>Veículo:</b> ${orcamento.veiculo}<br>
    <b>Total:</b> R$ ${orcamento.total}<br>

    <h4>Timeline</h4>
    <div class="timeline">
      <span>Entrada</span>
      <span>Funilaria</span>
      <span>Pintura</span>
      <span>Finalizaçăo</span>
    </div>

    <h4>ROI Estimado</h4>
    <p>Valorizaçăo estimada: R$ ${(orcamento.total * 1.3).toFixed(2)}</p>
  `;
}

function addEstoque(){
  const nome = document.getElementById('itemNome').value;
  const qtd = document.getElementById('itemQtd').value;
  const condicao = document.getElementById('condicao').value;

  estoque.push({nome, qtd, condicao});
  localStorage.setItem('estoque', JSON.stringify(estoque));

  renderEstoque();
}

function renderEstoque(){
  const ul = document.getElementById('listaEstoque');
  ul.innerHTML = '';

  estoque.forEach((item, i)=>{
    ul.innerHTML += `
      <li>
        ${item.nome} - ${item.qtd} (${item.condicao})
        <button onclick="remover(${i})">X</button>
      </li>
    `;
  });
}

function remover(i){
  estoque.splice(i,1);
  localStorage.setItem('estoque', JSON.stringify(estoque));
  renderEstoque();
}

renderEstoque();

</script>

</body>
</html>
