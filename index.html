<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OficinaOS</title>

<link rel="manifest" href="manifest.webmanifest">
<link rel="stylesheet" href="app.css">
</head>

<body>

<header class="topbar">
  <h1>OficinaOS</h1>
  <nav>
    <button onclick="showTab('financeiro')">Financeiro</button>
    <button onclick="showTab('orcamento')">Orçamento</button>
    <button onclick="showTab('agenda')">Agenda</button>
    <button onclick="showTab('clientes')">Clientes</button>
    <button onclick="showTab('ia')">IA</button>
  </nav>
</header>

<main>
<section id="financeiro" class="tab active">
  <h2>Financeiro</h2>
  <div class="grid">
    <div class="card green"><h3>Receitas</h3><p id="receitas">0</p></div>
    <div class="card red"><h3>Despesas</h3><p id="despesas">0</p></div>
    <div class="card"><h3>Resultado</h3><p id="resultado">0</p></div>
    <div class="card"><h3>Ponto de Equilíbrio</h3><p id="equilibrio">0</p></div>
  </div>
</section>

<section id="orcamento" class="tab">
  <h2>Orçamento</h2>
  <input id="cliente" placeholder="Cliente">
  <input id="veiculo" placeholder="Veículo">
  <button onclick="salvarOrcamento()">Salvar</button>
  <button onclick="lancarReceita()">Lançar Receita</button>
  <button onclick="limparOrcamento()">Limpar</button>
</section>

<section id="agenda" class="tab"><h2>Agenda</h2></section>
<section id="clientes" class="tab"><h2>Clientes</h2></section>

<section id="ia" class="tab">
  <h2>IA Restauração</h2>
  <textarea id="iaInput"></textarea>
  <button onclick="enviarIA()">Enviar</button>
  <div id="iaOutput"></div>
</section>

</main>

<script src="app.js"></script>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js');
}
</script>

</body>
</html>
