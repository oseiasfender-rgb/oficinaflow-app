<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>OficinaOS V700.50 — 7 Abas + IndexedDB</title>
<meta name="theme-color" content="#a95510">
<style>
:root{--line:#ead7c4;--brown:#a95510;--paper:#fffaf4;--bg:#f8f6f3;--text:#2c1a08;--green:#16a34a;--red:#dc2626}
*{box-sizing:border-box}html,body{height:100%;margin:0}body{font-family:Arial,sans-serif;background:var(--bg);color:var(--text);overflow:hidden}
.shell{height:100%;display:flex;flex-direction:column}
.top{min-height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 12px;background:linear-gradient(#fff,#faf5ee);border-bottom:1px solid var(--line);gap:10px}
.brand{display:flex;align-items:center;gap:8px;white-space:nowrap}.logo{background:var(--brown);color:white;font-weight:900;border-radius:5px;padding:8px}.name{font-weight:900;letter-spacing:3px}.sub{font-size:8px;letter-spacing:2px;color:#9b5a22}
.nav{display:flex;gap:3px;overflow:auto;flex:1;justify-content:center}.nav button,.tools button{border:1px solid transparent;background:transparent;border-radius:5px;padding:8px 9px;cursor:pointer;font-weight:700;white-space:nowrap}.nav button.active{background:#fff3e8;border-color:#dcb990;color:var(--brown)}.tools{display:flex;gap:4px;align-items:center}.tools button{border-color:var(--line);background:#fff}.status{font-size:10px;color:var(--green);white-space:nowrap}.status.error{color:var(--red)}
.stage{position:relative;flex:1;min-height:0}.view{position:absolute;inset:0;border:0;width:100%;height:100%;display:none;background:white}.view.active{display:block}
@media(max-width:1100px){.top{height:auto;flex-wrap:wrap;padding:6px}.brand{order:1}.tools{order:2}.nav{order:3;width:100%;justify-content:flex-start}.status{display:none}}
</style>
</head>
<body>
<div class="shell">
<header class="top">
  <div class="brand"><div class="logo">OS</div><div><div class="name">OFICINAOS</div><div class="sub">7 ABAS · INDEXEDDB</div></div></div>
  <nav class="nav">
    <button class="active" data-open="orcamento">🧾 Orçamento</button>
    <button data-open="financeiro">💰 Financeiro</button>
    <button data-open="agenda">📅 Agenda</button>
    <button data-open="clientes">👥 Clientes</button>
    <button data-open="metas">🎯 Metas</button>
    <button data-open="relatorios">📈 Relatórios</button>
    <button data-open="ia">🤖 IA</button>
  </nav>
  <div class="tools">
    <span class="status" id="status">● ABRINDO BANCO...</span>
    <button id="exportJson">Exportar JSON</button>
    <button id="importJson">Importar JSON</button>
    <button id="loadRealBackup">Carregar backup real</button>
    <button id="dbDiag">Diagnóstico DB</button>
    <button id="syncBtn">Sincronizar</button>
    <input id="jsonFile" type="file" accept=".json,application/json" hidden>
  </div>
</header>
<main class="stage">
  <iframe class="view active" data-module="orcamento" src="./modulos/orcamento.html"></iframe>
  <iframe class="view" data-module="financeiro" src="./modulos/financeiro.html"></iframe>
  <iframe class="view" data-module="agenda" src="./modulos/agenda.html"></iframe>
  <iframe class="view" data-module="clientes" src="./modulos/clientes.html"></iframe>
  <iframe class="view" data-module="metas" src="./modulos/metas.html"></iframe>
  <iframe class="view" data-module="relatorios" src="./modulos/relatorios.html"></iframe>
  <iframe class="view" data-module="ia" src="./modulos/ia.html"></iframe>
</main>
</div>
<script src="./core700/state.js"></script>
<script src="./core700/events.js"></script>
<script src="./core700/indexeddb.js"></script>
<script src="./core700/ids.js"></script>
<script src="./core700/real-backup-seed.js"></script>
<script src="./core700/core.js"></script>
<script src="./core700/integration.js"></script>
<script>
function openWithCommand(module,action,payload){
  openModule(module);
  setTimeout(()=>OficinaOSCore.command(module,action,payload||{}),120);
}
function openModule(name){
  document.querySelectorAll(".view").forEach(x=>x.classList.toggle("active",x.dataset.module===name));
  document.querySelectorAll("[data-open]").forEach(x=>x.classList.toggle("active",x.dataset.open===name));
  location.hash=name;
  document.querySelectorAll('iframe').forEach(f=>f.contentWindow.postMessage({source:'oficinaos-v700',type:'STATE_CHANGED',payload:{state:OficinaOSCore700.getState()}},'*'));
}
document.querySelector(".nav").onclick=e=>{
  const b=e.target.closest("[data-open]");
  if(b)openModule(b.dataset.open);
};
window.addEventListener("message",e=>{
  const msg=e.data||{};
  if(msg.source!=="oficinaos-module")return;
  if(msg.type==="navigate"){openModule(msg.payload);return}
  if(msg.type==="navigate:command"){
    const p=msg.payload||{};
    openWithCommand(p.module,p.action,p.data||{});
    return;
  }
  if(msg.type==="module:ready"){document.querySelectorAll('iframe').forEach(f=>f.contentWindow.postMessage({source:'oficinaos-v700',type:'STATE_CHANGED',payload:{state:OficinaOSCore700.getState()}},'*'));return}
  OficinaOSCore.receive(msg).catch(err=>{
    status.textContent="● ERRO: "+err.message;
    status.classList.add("error");
  });
});
window.addEventListener("oficinaos:error",e=>{
  status.textContent="● ERRO: "+e.detail.message;
  status.classList.add("error");
});
document.querySelectorAll("iframe").forEach(f=>f.addEventListener("load",()=>document.querySelectorAll('iframe').forEach(f=>f.contentWindow.postMessage({source:'oficinaos-v700',type:'STATE_CHANGED',payload:{state:OficinaOSCore700.getState()}},'*'))));
exportJson.onclick=()=>OficinaOSCore700.exportJSON();
importJson.onclick=()=>jsonFile.click();
jsonFile.onchange=async()=>{
  const file=jsonFile.files&&jsonFile.files[0];
  if(!file)return;

  if(!confirm("Importar este JSON e substituir os dados atuais?")){
    jsonFile.value="";
    return;
  }

  importJson.disabled=true;
  status.textContent="● IMPORTANDO JSON...";

  try{
    const result=await OficinaOSCore700.importFile(file);
    const summary=result&&result.summary?result.summary:{};

    if(window.OficinaOSIntegration700){
      OficinaOSIntegration700.broadcast();
    }

    document.querySelectorAll("iframe[data-module]").forEach(frame=>{
      frame.contentWindow.postMessage({
        source:"oficinaos-v700",
        type:"STATE_CHANGED",
        payload:{
          module:frame.dataset.module,
          state:OficinaOSCore700.getState(),
          force:true
        }
      },"*");
    });

    status.textContent="● JSON IMPORTADO";
    alert(
      "✅ JSON importado e confirmado no IndexedDB.\n\n"+
      "Clientes: "+(summary.clientes||0)+"\n"+
      "Orçamentos: "+(summary.orcamentos||0)+"\n"+
      "Agenda/OS: "+(summary.agenda||0)+"\n"+
      "Lançamentos: "+(summary.lancamentos||0)+"\n"+
      "Contas: "+(summary.contas||0)
    );
  }catch(err){
    status.textContent="● FALHA NA IMPORTAÇÃO";
    alert("❌ Falha ao importar JSON:\n"+err.message);
  }finally{
    importJson.disabled=false;
    jsonFile.value="";
  }
};

loadRealBackup.onclick=async()=>{
  if(!confirm("Carregar o backup real interno e substituir os dados atuais?"))return;

  loadRealBackup.disabled=true;
  status.textContent="● CARREGANDO BACKUP REAL...";

  try{
    const result=await OficinaOSCore700.loadRealBackup();
    const s=result.summary||{};

    if(window.OficinaOSIntegration700){
      OficinaOSIntegration700.broadcast();
    }

    status.textContent="● BACKUP REAL CARREGADO";

    alert(
      "✅ Backup real gravado no IndexedDB.\n\n"+
      "Clientes: "+(s.clientes||0)+"\n"+
      "Orçamentos: "+(s.orcamentos||0)+"\n"+
      "Agenda/OS: "+(s.agenda||0)+"\n"+
      "Lançamentos: "+(s.lancamentos||0)+"\n"+
      "Contas: "+(s.contas||0)
    );
  }catch(err){
    status.textContent="● FALHA NO BACKUP";
    alert("❌ Não foi possível carregar o backup real:\n"+err.message);
  }finally{
    loadRealBackup.disabled=false;
  }
};

dbDiag.onclick=async()=>{
  try{
    const d=await OficinaOSIndexedDB700.diagnose();

    alert(
      "✅ IndexedDB ativo\n\n"+
      "Banco: "+d.dbName+"\n"+
      "Versão: "+d.dbVersion+"\n"+
      "Stores: "+d.stores.join(", ")+"\n"+
      "STATE gravado: "+(d.hasState?"Sim":"Não")+"\n"+
      (d.counts
        ? "Clientes: "+d.counts.clientes+"\n"+
          "Orçamentos: "+d.counts.orcamentos+"\n"+
          "Agenda/OS: "+d.counts.agenda+"\n"+
          "Lançamentos: "+d.counts.lancamentos+"\n"+
          "Contas: "+d.counts.contas
        : "")
    );
  }catch(err){
    alert("❌ Diagnóstico do IndexedDB:\n"+err.message);
  }
};

syncBtn.onclick=()=>document.querySelectorAll('iframe').forEach(f=>f.contentWindow.postMessage({source:'oficinaos-v700',type:'STATE_CHANGED',payload:{state:OficinaOSCore700.getState()}},'*'));
OficinaOSCore700.start().then(async()=>{
  const info=await OficinaOSIndexedDB700.estimate();
  const diag=await OficinaOSIndexedDB700.diagnose();

  status.textContent="● INDEXEDDB V700.50 ATIVO";
  status.title=
    "Banco: "+diag.dbName+
    " | Versão: "+diag.dbVersion+
    (info.quota
      ?" | Uso: "+Math.round(info.usage/1024/1024)+" MB / "+Math.round(info.quota/1024/1024)+" MB"
      :"");

  if(window.OficinaOSIntegration700){
    OficinaOSIntegration700.start();
  }

  openModule((location.hash||"#orcamento").slice(1));
}).catch(err=>{
  status.textContent="● ERRO NO INDEXEDDB";
  status.classList.add("error");
  alert("❌ Falha ao iniciar o IndexedDB:\\n"+err.message);
});
</script>
</body>
</html>
