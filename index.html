<script>
(()=>{'use strict';
const STORAGE='ofix_v546_11_10_state';
const $=id=>document.getElementById(id); const q=s=>document.querySelector(s); const qa=s=>[...document.querySelectorAll(s)];
const br=v=>(Number(v)||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'}); const num=v=>Number(String(v??'').replace(',','.'))||0; const uid=p=>p+'_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,7);
const STATE={ui:{tab:'orcamento'},orcamentos:{ativo:null,lista:[]},clientes:{lista:[]},financeiro:{transacoes:[],recebiveis:[],pix:[],nfe:[],recibos:[]},contas:{lista:[]},agenda:{eventos:[]},metas:{principal:10000}};
const SIM={cliente:{nome:'Gustavo Souza',telefone:'(19) 99999-0000',doc:'',veiculo:'HB20 • Marrom • PYC9F74 • 2017',placa:'PYC9F74'},orcamento:{id:'ORC-SIM',servico:'Funilaria e Pintura',complexidade:'Médio / Alto',prioridade:'Normal',valorHora:55,margem:0,desconto:0,horas:{desmontagem:4,funilaria:28,solda:3,preparacao:18,pintura:10,montagem:6,polimento:5},materiais:[{nome:'Primer/PU/Verniz alto sólido',aplicado:1220},{nome:'Lixas, fitas e insumos',aplicado:460}],pecas:[{nome:'Peças e serviços terceiros',valor:0}],descricao:'• Funilaria e pintura frontal\n• Recuperação do para-choque dianteiro e paralama esquerdo\n• Recuperação da porta dianteira esquerda\n• Alinhamento da caixa de roda esquerda\n• Recuperação do capô dianteiro\n• Polimento técnico final'}};
function persist(){localStorage.setItem(STORAGE,JSON.stringify(STATE))} function hydrate(){try{const x=JSON.parse(localStorage.getItem(STORAGE)||'null'); if(!x)return false; Object.assign(STATE.ui,x.ui||{}); Object.assign(STATE.orcamentos,x.orcamentos||{}); Object.assign(STATE.clientes,x.clientes||{}); Object.assign(STATE.financeiro,x.financeiro||{}); Object.assign(STATE.contas,x.contas||{}); Object.assign(STATE.agenda,x.agenda||{}); Object.assign(STATE.metas,x.metas||{}); return true}catch{return false}}
function toast(t){const el=$('toast'); el.textContent=t; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),2500)}
function mult(c){return c==='Médio / Alto'||c==='Alto'?1.6:c==='Restauração'?2:c==='Médio'?1.3:1}
function calc(o){o=o||collectOrc(); const h=Object.values(o.horas||{}).reduce((a,b)=>a+num(b),0); const mo=h*num(o.valorHora)*mult(o.complexidade); const materiais=(o.materiais||[]).reduce((a,m)=>a+num(m.aplicado),0); const pecas=(o.pecas||[]).reduce((a,p)=>a+num(p.valor),0); const base=mo+materiais+pecas; const margem=base*num(o.margem)/100; const desc=(base+margem)*num(o.desconto)/100; const total=base+margem-desc; return {horas:h,mo,materiais,pecas,base,margem,desc,total,cenarios:{Mínimo:base*1.2,Ideal:base*1.3,Premium:base*1.5}}}
function mountOrc(){ $('mod-orcamento').innerHTML=`<div class="module-body"><div class="module-left"><div class="card"><div class="sec-title"><span class="sec-icon">👤</span><span class="sec-lbl">Cliente e veículo</span></div><div class="grid three"><div class="field"><label>Cliente</label><input id="orcCliente"></div><div class="field"><label>Telefone</label><input id="orcTelefone"></div><div class="field"><label>CPF/CNPJ</label><input id="orcDoc"></div><div class="field"><label>Veículo</label><input id="orcVeiculo"></div><div class="field"><label>Placa</label><input id="orcPlaca"></div><div class="field"><label>Serviço</label><input id="orcServico"></div></div></div><div class="card"><div class="sec-title"><span class="sec-icon">🧠</span><span class="sec-lbl">Avaliação técnica</span></div><div class="grid three"><div class="field"><label>Complexidade</label><select id="orcComplexidade"><option>Básico</option><option>Médio</option><option>Alto</option><option>Médio / Alto</option><option>Restauração</option></select></div><div class="field"><label>Prioridade</label><select id="orcPrioridade"><option>Normal</option><option>Urgente</option><option>Programado</option></select></div><div class="field"><label>Valor hora</label><input id="orcValorHora" type="number" step="0.01"></div><div class="field"><label>Margem %</label><input id="orcMargem" type="number" step="0.1"></div><div class="field"><label>Desconto %</label><input id="orcDesconto" type="number" step="0.1"></div><div class="field"><label>Parcelas</label><input id="orcParcelas" type="number" value="2"></div></div><div class="grid four" id="orcHoras" style="margin-top:1rem"></div></div><div class="card"><div class="sec-title"><span class="sec-icon">📝</span><span class="sec-lbl">Descrição do serviço para PDF</span></div><div class="field"><label>Descrição técnica</label><textarea id="orcDescricao"></textarea></div></div><div class="card"><div class="sec-title"><span class="sec-icon">🎨</span><span class="sec-lbl">Materiais e peças</span></div><div class="grid"><div><div class="label">Materiais</div><div id="orcMateriais" class="list"></div></div><div><div class="label">Peças/terceiros</div><div id="orcPecas" class="list"></div></div></div></div><div class="actions"><button class="btn" id="btnSalvarOrc">Salvar orçamento</button><button class="btn primary" id="btnAprovarOrc">Aprovar e enviar ao Financeiro</button><button class="btn" id="btnPdfPremium">PDF Premium</button><button class="btn red" id="btnReset">Reset teste</button></div><div class="card"><div class="sec-title"><span class="sec-icon">📚</span><span class="sec-lbl">Histórico</span></div><div id="orcHistorico" class="list"></div></div></div><aside class="module-right"><div class="hero"><div class="label">Resumo do orçamento</div><div class="value" id="orcTotal">R$ 0,00</div><div class="item-sub" id="orcCtx"></div></div><div class="label">Composição</div><div id="orcResumo"></div><div class="label" style="margin-top:1rem">Cenários</div><div class="scenario-grid" id="orcCenarios"></div><p class="muted" style="margin-top:1rem">Aprovar cria recebível e agenda. Receita só entra no caixa após confirmação no Financeiro.</p></aside></div>`; ['desmontagem','funilaria','solda','preparacao','pintura','montagem','polimento'].forEach(k=>$('orcHoras').insertAdjacentHTML('beforeend',`<div class="field"><label>${k}</label><input id="h_${k}" type="number" step="0.1" value="0"></div>`)); qa('#mod-orcamento input,#mod-orcamento select,#mod-orcamento textarea').forEach(e=>e.addEventListener('input',renderOrc)); $('btnSalvarOrc').onclick=salvarOrc; $('btnAprovarOrc').onclick=aprovarOrc; $('btnPdfPremium').onclick=pdfPremium; $('btnReset').onclick=()=>{localStorage.removeItem(STORAGE);location.reload()}; }
function loadSim(){const c=SIM.cliente,o=SIM.orcamento; setVal('orcCliente',c.nome);setVal('orcTelefone',c.telefone);setVal('orcDoc',c.doc);setVal('orcVeiculo',c.veiculo);setVal('orcPlaca',c.placa);setVal('orcServico',o.servico);setVal('orcComplexidade',o.complexidade);setVal('orcPrioridade',o.prioridade);setVal('orcValorHora',o.valorHora);setVal('orcMargem',0);setVal('orcDesconto',0);setVal('orcDescricao',o.descricao);Object.entries(o.horas).forEach(([k,v])=>setVal('h_'+k,v)); STATE.orcamentos.ativo=JSON.parse(JSON.stringify({...o,cliente:c}));}
function setVal(id,v){const e=$(id);if(e)e.value=v??''} function val(id){return $(id)?.value||''}
function collectOrc(){const hs={}; ['desmontagem','funilaria','solda','preparacao','pintura','montagem','polimento'].forEach(k=>hs[k]=num(val('h_'+k))); const ativo=STATE.orcamentos.ativo||SIM.orcamento; return {...ativo,cliente:{nome:val('orcCliente'),telefone:val('orcTelefone'),doc:val('orcDoc'),veiculo:val('orcVeiculo'),placa:val('orcPlaca')},clienteNome:val('orcCliente'),servico:val('orcServico'),complexidade:val('orcComplexidade'),prioridade:val('orcPrioridade'),valorHora:num(val('orcValorHora')),margem:num(val('orcMargem')),desconto:num(val('orcDesconto')),descricao:val('orcDescricao'),horas:hs}}
function renderOrc(){const o=collectOrc(); STATE.orcamentos.ativo=o; const r=calc(o); $('orcTotal').textContent=br(r.total); $('orcCtx').textContent=`${o.complexidade} · ${o.prioridade} · ${r.horas.toFixed(1)}h`; $('orcResumo').innerHTML=[['Horas',r.horas.toFixed(1)+'h'],['Mão de obra',br(r.mo)],['Materiais',br(r.materiais)],['Peças',br(r.pecas)],['Base',br(r.base)],['Margem',br(r.margem)],['Desconto','− '+br(r.desc)]].map(x=>`<div class="summary-line"><span>${x[0]}</span><b>${x[1]}</b></div>`).join(''); $('orcCenarios').innerHTML=Object.entries(r.cenarios).map(([k,v])=>`<div class="scenario"><div class="n">${k}</div><div class="v">${br(v)}</div></div>`).join(''); $('orcMateriais').innerHTML=(o.materiais||[]).map(m=>`<div class="item info"><div><div class="item-title">${m.nome}</div><div class="item-sub">Material aplicado</div></div><b>${br(m.aplicado)}</b></div>`).join('')||'<p class="muted">Sem materiais.</p>'; $('orcPecas').innerHTML=(o.pecas||[]).map(p=>`<div class="item warn"><div><div class="item-title">${p.nome}</div><div class="item-sub">Peças/terceiros</div></div><b>${br(p.valor)}</b></div>`).join('')||'<p class="muted">Sem peças.</p>'; renderHist(); return r}
function upsertCliente(c){let x=STATE.clientes.lista.find(a=>a.placa===c.placa||a.telefone===c.telefone); if(!x){x={...c,id:uid('cl'),timeline:[]};STATE.clientes.lista.push(x)}else Object.assign(x,c); return x}
function salvarOrc(){const o=collectOrc(), c=upsertCliente(o.cliente), r=calc(o); const old=STATE.orcamentos.lista.find(x=>x.id===o.id); const snap={...JSON.parse(JSON.stringify(o)),id:old?.id||uid('orc'),clienteId:c.id,status:old?.status||'aberto',versao:(old?.versao||0)+1,resumo:r,updatedAt:new Date().toISOString()}; const i=STATE.orcamentos.lista.findIndex(x=>x.id===snap.id); if(i>=0)STATE.orcamentos.lista[i]=snap; else STATE.orcamentos.lista.push(snap); STATE.orcamentos.ativo=snap; c.timeline.push({tipo:'orçamento',texto:`${snap.id} salvo v${snap.versao}`}); persist(); renderAll(); toast('Orçamento salvo.'); return snap}
function aprovarOrc(){const s=salvarOrc(); s.status='aprovado'; const cliente=STATE.clientes.lista.find(c=>c.id===s.clienteId); const parcelas=Math.max(1,num(val('orcParcelas'))||1); for(let i=1;i<=parcelas;i++){STATE.financeiro.recebiveis.push({id:uid('rec'),refId:s.id,descricao:`Recebível ${s.id} ${i}/${parcelas}`,valor:s.resumo.total/parcelas,status:'pendente',data:new Date().toISOString().slice(0,10),cliente:cliente?.nome})} STATE.financeiro.pix.push({id:uid('pix'),refId:s.id,valor:s.resumo.total}); STATE.financeiro.nfe.push({id:uid('nfe'),refId:s.id,valor:s.resumo.total}); STATE.agenda.eventos.push({id:uid('ag'),orcamentoId:s.id,data:new Date().toISOString().slice(0,10),titulo:'Iniciar OS '+s.id,cliente:cliente?.nome,status:'agendado'}); persist(); renderAll(); toast('Aprovado: recebível + agenda criados.')}
function renderHist(){const box=$('orcHistorico'); box.innerHTML=STATE.orcamentos.lista.filter(o=>!o.deleted).map(o=>`<div class="item ${o.status==='aprovado'?'ok':'info'}"><div><div class="item-title">${o.id} · ${o.clienteNome||o.cliente?.nome||''}</div><div class="item-sub">${o.servico} · v${o.versao} · ${o.status} · ${br(o.resumo?.total)}</div></div><button class="btn" data-edit="${o.id}">Editar</button></div>`).join('')||'<p class="muted">Sem histórico.</p>'; box.querySelectorAll('[data-edit]').forEach(b=>b.onclick=()=>{const o=STATE.orcamentos.lista.find(x=>x.id===b.dataset.edit); if(!o)return; STATE.orcamentos.ativo=o; setFormFromOrc(o); renderOrc(); toast('Orçamento carregado para edição.')})}
function setFormFromOrc(o){setVal('orcCliente',o.cliente?.nome||o.clienteNome);setVal('orcTelefone',o.cliente?.telefone);setVal('orcDoc',o.cliente?.doc);setVal('orcVeiculo',o.cliente?.veiculo);setVal('orcPlaca',o.cliente?.placa);setVal('orcServico',o.servico);setVal('orcComplexidade',o.complexidade);setVal('orcPrioridade',o.prioridade);setVal('orcValorHora',o.valorHora);setVal('orcMargem',o.margem);setVal('orcDesconto',o.desconto);setVal('orcDescricao',o.descricao);Object.entries(o.horas||{}).forEach(([k,v])=>setVal('h_'+k,v))}
function mountFinanceiro(){ $('mod-financeiro').innerHTML=`<div class="module-body three"><div class="module-left"><div class="kpis"><div class="kpi"><div class="label">Receitas caixa</div><div class="v" id="finRec">R$0</div></div><div class="kpi"><div class="label">Despesas</div><div class="v" id="finDep">R$0</div></div><div class="kpi"><div class="label">Saldo</div><div class="v" id="finSaldo">R$0</div></div><div class="kpi"><div class="label">Recebíveis</div><div class="v" id="finRecebiveis">R$0</div></div></div><div class="card"><div class="sec-title"><span class="sec-icon">➕</span><span class="sec-lbl">Lançar transação</span></div><div class="grid four"><div class="field"><label>Tipo</label><select id="finTipo"><option value="receita">Receita</option><option value="despesa">Despesa</option></select></div><div class="field"><label>Descrição</label><input id="finDesc"></div><div class="field"><label>Valor</label><input id="finValor" type="number" step="0.01"></div><div class="field"><label>Data</label><input id="finData" type="date"></div></div><button class="btn primary" id="btnAddTx" style="margin-top:.8rem">Lançar</button></div><div class="card"><div class="sec-title"><span class="sec-icon">📋</span><span class="sec-lbl">Transações</span></div><div id="finLista" class="list"></div></div></div><div class="module-mid"><div class="card"><div class="sec-title"><span class="sec-icon">💳</span><span class="sec-lbl">Recebíveis pendentes</span></div><div id="recLista" class="list"></div></div></div><aside class="module-right"><div class="label">Recibos / PIX / NF-e</div><div id="finDocs" class="list" style="margin-top:.7rem"></div></aside></div>`; setVal('finData',new Date().toISOString().slice(0,10)); $('btnAddTx').onclick=addTx}
function addTx(){STATE.financeiro.transacoes.push({id:uid('tx'),tipo:val('finTipo'),descricao:val('finDesc'),valor:num(val('finValor')),data:val('finData')});persist();renderAll();toast('Transação lançada.')}
function renderFinanceiro(){const rec=STATE.financeiro.transacoes.filter(t=>t.tipo==='receita').reduce((a,t)=>a+num(t.valor),0), dep=STATE.financeiro.transacoes.filter(t=>t.tipo==='despesa').reduce((a,t)=>a+num(t.valor),0), receb=STATE.financeiro.recebiveis.filter(r=>r.status!=='pago').reduce((a,r)=>a+num(r.valor),0); $('finRec').textContent=br(rec);$('finDep').textContent=br(dep);$('finSaldo').textContent=br(rec-dep);$('finRecebiveis').textContent=br(receb);$('finLista').innerHTML=STATE.financeiro.transacoes.map(t=>`<div class="item ${t.tipo==='receita'?'ok':'bad'}"><div><div class="item-title">${t.descricao}</div><div class="item-sub">${t.tipo} · ${t.data}</div></div><b>${br(t.valor)}</b></div>`).join('')||'<p class="muted">Sem transações.</p>'; $('recLista').innerHTML=STATE.financeiro.recebiveis.map(r=>`<div class="item warn"><div><div class="item-title">${r.descricao}</div><div class="item-sub">${r.cliente||''} · ${r.status}</div></div><div><b>${br(r.valor)}</b> <button class="btn green" data-pay="${r.id}">Confirmar</button></div></div>`).join('')||'<p class="muted">Sem recebíveis.</p>'; $('recLista').querySelectorAll('[data-pay]').forEach(b=>b.onclick=()=>{const r=STATE.financeiro.recebiveis.find(x=>x.id===b.dataset.pay); if(!r||r.status==='pago')return; r.status='pago'; STATE.financeiro.transacoes.push({id:uid('tx'),tipo:'receita',descricao:r.descricao,valor:r.valor,data:new Date().toISOString().slice(0,10),refId:r.refId}); STATE.financeiro.recibos.push({id:uid('rcb'),refId:r.refId,valor:r.valor}); persist();renderAll();toast('Pagamento confirmado no caixa.')}); $('finDocs').innerHTML=[...STATE.financeiro.pix.map(p=>['PIX',p]),...STATE.financeiro.nfe.map(n=>['NF-e',n]),...STATE.financeiro.recibos.map(r=>['Recibo',r])].map(([t,d])=>`<div class="item info"><div><div class="item-title">${t}</div><div class="item-sub">${d.refId||''}</div></div><b>${br(d.valor)}</b></div>`).join('')||'<p class="muted">Sem documentos.</p>'}
function mountContas(){ $('mod-contas').innerHTML=`<div class="module-body"><div class="module-left"><div class="card"><div class="sec-title"><span class="sec-icon">🚨</span><span class="sec-lbl">Nova conta</span></div><div class="grid four"><div class="field"><label>Descrição</label><input id="contaDesc"></div><div class="field"><label>Valor</label><input id="contaValor" type="number"></div><div class="field"><label>Vencimento</label><input id="contaVenc" type="date"></div><div class="field"><label>Categoria</label><input id="contaCat" value="Fixos"></div></div><button class="btn primary" id="btnAddConta" style="margin-top:.8rem">Cadastrar</button></div><div class="card"><div id="contasLista" class="list"></div></div></div><aside class="module-right"><div class="hero"><div class="label">Pendências</div><div class="value" id="contasPend">R$0</div></div></aside></div>`;setVal('contaVenc',new Date().toISOString().slice(0,10));$('btnAddConta').onclick=addConta}
function addConta(){STATE.contas.lista.push({id:uid('ct'),descricao:val('contaDesc'),valor:num(val('contaValor')),vencimento:val('contaVenc'),categoria:val('contaCat'),status:'pendente'});persist();renderAll();toast('Conta cadastrada.')}
function renderContas(){const pend=STATE.contas.lista.filter(c=>c.status!=='pago').reduce((a,c)=>a+num(c.valor),0);$('contasPend').textContent=br(pend);$('contasLista').innerHTML=STATE.contas.lista.map(c=>`<div class="item ${c.status==='pago'?'ok':'warn'}"><div><div class="item-title">${c.descricao}</div><div class="item-sub">${c.categoria} · ${c.vencimento} · ${c.status}</div></div><div><b>${br(c.valor)}</b> <button class="btn green" data-conta="${c.id}">Pagar</button></div></div>`).join('')||'<p class="muted">Sem contas.</p>'; $('contasLista').querySelectorAll('[data-conta]').forEach(b=>b.onclick=()=>{const c=STATE.contas.lista.find(x=>x.id===b.dataset.conta); if(!c||c.status==='pago')return; c.status='pago'; STATE.financeiro.transacoes.push({id:uid('tx'),tipo:'despesa',descricao:c.descricao,valor:c.valor,data:new Date().toISOString().slice(0,10)}); persist();renderAll();toast('Conta paga e lançada como despesa.')})}
function mountClientes(){ $('mod-clientes').innerHTML=`<div class="module-body"><div class="module-left"><div class="card"><div class="sec-title"><span class="sec-icon">👥</span><span class="sec-lbl">CRM</span></div><div class="field"><label>Buscar</label><input id="clienteBusca"></div></div><div id="clientesLista" class="list"></div></div><aside class="module-right"><div class="label">Detalhe</div><div id="clienteDetalhe" class="list" style="margin-top:.7rem"></div></aside></div>`; $('clienteBusca').oninput=renderClientes}
function renderClientes(){const termo=(val('clienteBusca')||'').toLowerCase(); const lista=STATE.clientes.lista.filter(c=>JSON.stringify(c).toLowerCase().includes(termo)); $('clientesLista').innerHTML=lista.map(c=>`<div class="item info"><div><div class="item-title">${c.nome}</div><div class="item-sub">${c.veiculo||''} · ${c.placa||''} · ${c.telefone||''}</div></div><button class="btn" data-cl="${c.id}">Ver</button></div>`).join('')||'<p class="muted">Sem clientes.</p>'; $('clientesLista').querySelectorAll('[data-cl]').forEach(b=>b.onclick=()=>{const c=STATE.clientes.lista.find(x=>x.id===b.dataset.cl); $('clienteDetalhe').innerHTML=(c.timeline||[]).map(t=>`<div class="item"><div><div class="item-title">${t.tipo}</div><div class="item-sub">${t.texto}</div></div></div>`).join('')||'<p class="muted">Sem timeline.</p>'})}
function mountAgenda(){ $('mod-agenda').innerHTML=`<div class="module-body"><div class="module-left"><div class="card"><div class="sec-title"><span class="sec-icon">📅</span><span class="sec-lbl">Calendário</span></div><div class="cal-grid" id="calGrid"></div></div><div class="card"><div class="sec-title"><span class="sec-icon">🧾</span><span class="sec-lbl">OS / Serviços</span></div><div id="agendaLista" class="list"></div></div></div><aside class="module-right"><div class="label">Etapas</div><div class="list" style="margin-top:.7rem"><div class="item info"><div><div class="item-title">Desmontagem</div></div></div><div class="item info"><div><div class="item-title">Funilaria</div></div></div><div class="item info"><div><div class="item-title">Preparação/Pintura</div></div></div><div class="item info"><div><div class="item-title">Entrega</div></div></div></div></aside></div>`}
function renderAgenda(){const today=new Date(); let html=''; for(let i=1;i<=35;i++){html+=`<div class="cal-day ${i===today.getDate()?'today':''}"><div class="money">${i}</div>${STATE.agenda.eventos.filter(e=>Number(e.data?.slice(8,10))===i).map(e=>`<div class="item-sub">• ${e.titulo}</div>`).join('')}</div>`} $('calGrid').innerHTML=html; $('agendaLista').innerHTML=STATE.agenda.eventos.map(e=>`<div class="item info"><div><div class="item-title">${e.titulo}</div><div class="item-sub">${e.cliente||''} · ${e.data} · ${e.status}</div></div></div>`).join('')||'<p class="muted">Sem agenda.</p>'}
function mountMetas(){ $('mod-metas').innerHTML=`<div class="module-body"><div class="module-left"><div class="card"><div class="sec-title"><span class="sec-icon">🎯</span><span class="sec-lbl">Metas por caixa real</span></div><div id="metasBox"></div></div></div><aside class="module-right"><div id="metasAlertas"></div></aside></div>`}
function renderMetas(){const receita=STATE.financeiro.transacoes.filter(t=>t.tipo==='receita').reduce((a,t)=>a+num(t.valor),0); const pct=Math.min(100,receita/STATE.metas.principal*100); $('metasBox').innerHTML=`<div class="hero"><div class="label">Meta principal</div><div class="value">${br(STATE.metas.principal)}</div><div class="item-sub">Realizado: ${br(receita)} · ${pct.toFixed(1)}%</div></div><div style="height:10px;background:#eee;border-radius:10px;overflow:hidden"><div style="height:100%;width:${pct}%;background:var(--green)"></div></div>`; $('metasAlertas').innerHTML=`<div class="item ${pct>=100?'ok':'warn'}"><div><div class="item-title">${pct>=100?'Meta batida':'Meta em andamento'}</div><div class="item-sub">Base: caixa confirmado, não recebível pendente.</div></div></div>`}
function mountRelatorios(){ $('mod-relatorios').innerHTML=`<div class="module-body"><div class="module-left"><div class="card"><div class="sec-title"><span class="sec-icon">📈</span><span class="sec-lbl">Relatórios</span></div><div id="relBox" class="list"></div></div></div><aside class="module-right"><pre id="relExport" style="white-space:pre-wrap;font-family:DM Mono;font-size:.75rem"></pre></aside></div>`}
function renderRelatorios(){const rec=STATE.financeiro.transacoes.filter(t=>t.tipo==='receita').reduce((a,t)=>a+num(t.valor),0), dep=STATE.financeiro.transacoes.filter(t=>t.tipo==='despesa').reduce((a,t)=>a+num(t.valor),0), receb=STATE.financeiro.recebiveis.filter(r=>r.status!=='pago').reduce((a,r)=>a+num(r.valor),0); $('relBox').innerHTML=[['Receitas caixa',rec],['Despesas',dep],['Saldo caixa',rec-dep],['Recebíveis pendentes',receb],['Orçamentos',STATE.orcamentos.lista.length],['Clientes',STATE.clientes.lista.length]].map(x=>`<div class="item"><div><div class="item-title">${x[0]}</div></div><b>${typeof x[1]==='number'&&x[0]!=='Orçamentos'&&x[0]!=='Clientes'?br(x[1]):x[1]}</b></div>`).join(''); $('relExport').textContent=JSON.stringify({rec,dep,saldo:rec-dep,recebiveis:receb},null,2)}
function mountIA(){ $('mod-ia').innerHTML=`<div class="module-body"><div class="module-left"><div class="card"><div class="sec-title"><span class="sec-icon">🤖</span><span class="sec-lbl">IA consultiva</span></div><div id="iaBox" class="list"></div></div></div><aside class="module-right"><p class="muted">A IA só lê dados consolidados do STATE. Não cria lançamentos.</p></aside></div>`}
function renderIA(){const receb=STATE.financeiro.recebiveis.filter(r=>r.status!=='pago').length; const contas=STATE.contas.lista.filter(c=>c.status!=='pago').length; $('iaBox').innerHTML=`<div class="item info"><div><div class="item-title">Diagnóstico</div><div class="item-sub">${STATE.orcamentos.lista.length} orçamento(s), ${receb} recebível(is), ${contas} conta(s) pendente(s).</div></div></div><div class="item warn"><div><div class="item-title">Regra crítica</div><div class="item-sub">Não misturar recebível com caixa. Só pagamento confirmado vira receita.</div></div></div>`}
function pdfPremium(){const o=collectOrc(), r=calc(o); const w=window.open('','_blank'); w.document.write(`<html><head><title>PDF Premium</title><style>body{font-family:Arial;margin:0;background:#eee}.sheet{width:760px;margin:20px auto;background:#fff;padding:36px;color:#222}.head{display:flex;justify-content:space-between;border-bottom:4px solid #b8621a;padding-bottom:18px}.brand{font-size:32px;font-weight:800;color:#b8621a}.box{margin-top:22px}.title{font-size:12px;letter-spacing:2px;color:#8a5a2b;text-transform:uppercase;border-bottom:1px solid #ddd;padding-bottom:6px;margin-bottom:10px}.row{display:flex;justify-content:space-between;border-bottom:1px solid #eee;padding:8px 0}.total{font-size:24px;font-weight:800;color:#b8621a}</style></head><body><div class="sheet"><div class="head"><div><div class="brand">LIMAPRATA</div><div>Reparações Automotivas<br>Av. Hermínio Ometto, 576 • Leme/SP</div></div><div><b>ORÇAMENTO Nº</b><br>${o.id||'7954'}<br>${new Date().toLocaleDateString('pt-BR')}</div></div><div class="box"><div class="title">Cliente</div>${o.cliente.nome}</div><div class="box"><div class="title">Veículo</div>${o.cliente.veiculo}</div><div class="box"><div class="title">Complexidade</div>${o.complexidade}</div><div class="box"><div class="title">Serviço</div>${o.servico}</div><div class="box"><div class="title">Identificação e descrição do serviço</div><div style="white-space:pre-line">${o.descricao}</div></div><div class="box"><div class="title">Serviços e materiais</div><div class="row"><span>Mão de Obra + Materiais</span><b>${br(r.mo+r.materiais)}</b></div><div class="row"><span>Peças e Serviços</span><b>${br(r.pecas)}</b></div><div class="row total"><span>Total Geral</span><b>${br(r.total)}</b></div></div><div class="box">Limaprata Reparações Automotivas • Leme/SP<br>Oséias — Responsável Técnico</div></div><script>window.print()<\/script></body></html>`); w.document.close()}
function mountAll(){mountOrc();mountFinanceiro();mountContas();mountClientes();mountAgenda();mountMetas();mountRelatorios();mountIA()} function renderAll(){renderOrc();renderFinanceiro();renderContas();renderClientes();renderAgenda();renderMetas();renderRelatorios();renderIA()}
function showTab(tab){STATE.ui.tab=tab; qa('.nav-tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab)); qa('.panel').forEach(p=>p.classList.remove('active')); $('mod-'+tab)?.classList.add('active'); renderAll()}
function boot(){mountAll(); if(!hydrate())loadSim(); else setFormFromOrc(STATE.orcamentos.ativo||{...SIM.orcamento,cliente:SIM.cliente}); renderAll(); qa('.nav-tab').forEach(b=>b.onclick=()=>showTab(b.dataset.tab)); window.OFIX={STATE,renderAll,reset:()=>{localStorage.removeItem(STORAGE);location.reload()}}; console.log('Ofix V546.11.10 Render Fix Standalone carregado',STATE)}
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',boot);else boot();
})();
