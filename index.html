<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>OficinaOS V549.00 — Engenharia</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#a95510">
<style>
body{margin:0;font-family:Arial,sans-serif;background:#fbf7f1;color:#24160d}
header{height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 18px;background:#fffaf4;border-bottom:1px solid #ead7c4}
main{padding:18px;display:grid;gap:12px;grid-template-columns:repeat(auto-fit,minmax(220px,1fr))}
.card{background:#fffaf4;border:1px solid #ead7c4;border-radius:8px;padding:14px}
button{border:1px solid #dcb990;background:#a95510;color:#fff;border-radius:6px;padding:9px 12px;font-weight:700;cursor:pointer}
small{color:#80634b}
strong{font-size:24px;display:block;margin-top:6px}
</style>
</head>
<body>
<header>
  <b>OFICINAOS V549.00 — ENGENHARIA</b>
  <div>
    <button data-oficinaos-export>Exportar Backup</button>
    <input data-oficinaos-import type="file" accept="application/json" hidden id="importFile">
    <button onclick="document.getElementById('importFile').click()">Importar</button>
  </div>
</header>
<main>
  <div class="card"><small>Receitas do mês</small><strong id="receitas">R$ 0,00</strong></div>
  <div class="card"><small>Despesas do mês</small><strong id="despesas">R$ 0,00</strong></div>
  <div class="card"><small>Lucro do mês</small><strong id="lucro">R$ 0,00</strong></div>
  <div class="card"><small>OS abertas</small><strong id="os">0</strong></div>
  <div class="card"><small>Clientes</small><strong id="clientes">0</strong></div>
  <div class="card"><small>Orçamentos</small><strong id="orcamentos">0</strong></div>
</main>
<script src="./core.js"></script>
<script src="./backup.js"></script>
<script>
function money(v){return Number(v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});}
function render(){
  const r = OficinaOSCore.getResumo();
  receitas.textContent = money(r.receitas);
  despesas.textContent = money(r.despesas);
  lucro.textContent = money(r.lucro);
  os.textContent = r.osAbertas;
  clientes.textContent = r.clientes;
  orcamentos.textContent = r.orcamentos;
}
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("./sw.js").catch(console.warn);
}
render();
</script>
</body>
</html>
