<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OficinaOS</title>

<style>
:root{
  --bg:#f8f6f3;
  --card:#ffffff;
  --text:#2a1a08;
  --primary:#b8621a;
  --green:#16a34a;
  --red:#dc2626;
  --blue:#1d6fa4;
}

body{
  margin:0;
  font-family:Arial, sans-serif;
  background:var(--bg);
  color:var(--text);
}

header{
  background:#000;
  color:#fff;
  padding:12px;
  display:flex;
  justify-content:space-between;
}

nav{
  display:flex;
  gap:10px;
  background:#111;
  padding:8px;
}

nav button{
  background:#222;
  color:#fff;
  border:none;
  padding:10px;
  cursor:pointer;
}

main{
  padding:15px;
}

.card{
  background:var(--card);
  padding:15px;
  margin-bottom:10px;
  border-radius:8px;
}

input, select{
  width:100%;
  padding:8px;
  margin:5px 0;
}
</style>
</head>

<body>

<header>
  <div><b>OficinaOS</b></div>
  <div id="syncStatus">Local</div>
</header>

<nav>
  <button onclick="show('orcamento')">Orçamento</button>
  <button onclick="show('financeiro')">Financeiro</button>
  <button onclick="show('clientes')">Clientes</button>
</nav>

<main id="app"></main>

<script>

/* =========================
   STORE CENTRAL (BASE LIMPA)
========================= */

const store = {
  clientes: [],
  orcamentos: [],
  ordensServico: [],
  transacoes: []
}

/* =========================
   UTIL
========================= */

function uid(){
  return Date.now().toString()
}

function salvarLocal(){
  localStorage.setItem('oficinaOS', JSON.stringify(store))
}

function carregarLocal(){
  const data = localStorage.getItem('oficinaOS')
  if(data){
    Object.assign(store, JSON.parse(data))
  }
}

/* =========================
   ROUTER
========================= */

function show(tela){
  if(tela === 'orcamento') renderOrcamento()
  if(tela === 'financeiro') renderFinanceiro()
  if(tela === 'clientes') renderClientes()
}

/* =========================
   ORÇAMENTO
========================= */

function criarOrcamento(){
  const o = {
    id: uid(),
    cliente: document.getElementById('cliente').value,
    veiculo: document.getElementById('veiculo').value,
    servico: document.getElementById('servico').value,
    valor: parseFloat(document.getElementById('valor').value || 0),
    status:'pendente'
  }

  store.orcamentos.push(o)
  salvarLocal()
  alert('Orçamento criado')
}

function aprovar(id){
  const o = store.orcamentos.find(x=>x.id===id)
  if(!o) return

  o.status='aprovado'

  store.ordensServico.push({
    ...o,
    etapa:'execucao'
  })

  lancarReceita(o)
  salvarLocal()
  renderOrcamento()
}

function lancarReceita(o){
  store.transacoes.push({
    id: uid(),
    tipo:'receita',
    descricao:o.servico,
    valor:o.valor,
    data:new Date().toLocaleDateString(),
    pago:false
  })
}

/* UI */

function renderOrcamento(){
  app.innerHTML = `
  <div class="card">
    <h3>Novo Orçamento</h3>

    <input id="cliente" placeholder="Cliente">
    <input id="veiculo" placeholder="Veículo">
    <input id="servico" placeholder="Serviço">
    <input id="valor" placeholder="Valor">

    <button onclick="criarOrcamento()">Criar</button>
  </div>

  <div class="card">
    <h3>Lista</h3>
    ${store.orcamentos.map(o=>`
      <div>
        ${o.cliente} - R$ ${o.valor} (${o.status})
        ${o.status==='pendente'
          ? `<button onclick="aprovar('${o.id}')">Aprovar</button>`
          : ''
        }
      </div>
    `).join('')}
  </div>
  `
}

/* =========================
   FINANCEIRO
========================= */

function togglePago(id){
  const t = store.transacoes.find(x=>x.id===id)
  t.pago = !t.pago
  salvarLocal()
  renderFinanceiro()
}

function renderFinanceiro(){
  app.innerHTML = `
  <div class="card">
    <h3>Financeiro</h3>

    ${store.transacoes.map(t=>`
      <div>
        ${t.descricao} - R$ ${t.valor}
        <button onclick="togglePago('${t.id}')">
          ${t.pago ? 'Pago' : 'Pendente'}
        </button>
      </div>
    `).join('')}
  </div>
  `
}

/* =========================
   CLIENTES
========================= */

function addCliente(){
  store.clientes.push({
    id: uid(),
    nome: document.getElementById('nomeCliente').value
  })

  salvarLocal()
  renderClientes()
}

function renderClientes(){
  app.innerHTML = `
  <div class="card">
    <h3>Novo Cliente</h3>
    <input id="nomeCliente" placeholder="Nome">
    <button onclick="addCliente()">Adicionar</button>
  </div>

  <div class="card">
    <h3>Lista</h3>
    ${store.clientes.map(c=>`
      <div>${c.nome}</div>
    `).join('')}
  </div>
  `
}

/* =========================
   INIT (CORRETO)
========================= */

carregarLocal()
show('orcamento')

</script>

</body>
</html>
