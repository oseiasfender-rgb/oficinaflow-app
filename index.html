<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>OficinaOS V546.60</title><link rel="stylesheet" href="style.css"></head><body><header class="top"><div class="logo">OS</div><div class="brand"><b>OFICINAOS</b><small>V546.60 CLIENTES CORE</small></div><div class="nav"><a href="index.html">Painel</a><a href="clientes.html">Clientes</a><a href="orcamento.html">Orçamento</a><a href="financeiro.html">Financeiro</a><a href="agenda.html">Agenda</a><a href="diagnostico.html">Diagnóstico</a><a href="storage.html">Storage</a></div></header><main class="main"><section class="panel"><h2>V546.60 CLIENTES CORE</h2><p>Clientes, veículos, busca, histórico, indicadores e integração concluídos.</p><input id="file" type="file" accept=".json,application/json" style="display:none"><button class="btn green" onclick="file.click()">📤 Importar JSON real</button><button class="btn blue" onclick="render()">🔄 Sincronizar</button><button class="btn red" onclick="limpar()">🧹 Limpar tudo</button></section><section class="panel"><div class="grid" id="cards"></div></section></main><div class="status" id="status">Local</div><script src="oficinaos-state.js?v=54660"></script><script>function render(){const s=OSCORE.load(),r=s.relatorios.ultimoResumo;cards.innerHTML=[['Clientes',s.clientes.length],['Veículos',s.veiculos.length],['Financeiro',s.financeiro.lancamentos.length],['Receitas',OSCORE.money(r.receitas)],['Resultado',OSCORE.money(r.resultado)],['Orçamentos',s.orcamentos.length],['OS',s.agenda.length]].map(x=>'<div class=card><small>'+x[0]+'</small><strong>'+x[1]+'</strong></div>').join('')}file.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{OSCORE.importBackup(JSON.parse(ev.target.result));render();alert('Backup importado')};r.readAsText(f)}function limpar(){if(prompt('Digite LIMPAR')!=='LIMPAR')return;OSCORE.clearAll();render()}render();</script></body></html>
