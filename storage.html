<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>OficinaOS Storage</title><script src="v547-core.js"></script><style>body{font:14px Arial;background:#fbf7f1;color:#24160d;margin:0;padding:20px}.btn{border:1px solid #dcb990;background:#fffaf4;border-radius:7px;padding:9px 12px;font-weight:700;cursor:pointer;text-decoration:none;color:#24160d}.card{background:#fffaf4;border:1px solid #ead7c4;border-radius:10px;padding:16px;margin:12px 0}table{width:100%;border-collapse:collapse;background:#fff}td,th{border-bottom:1px solid #ead7c4;padding:8px;text-align:left}</style></head><body><a class="btn" href="index.html">← Painel</a> <button class="btn" onclick="V547Core.exportBackup()">Backup</button> <button class="btn" onclick="document.getElementById('import').click()">Importar</button> <button class="btn" onclick="V547Core.clearAll()">Limpar</button><input id="import" type="file" accept=".json,application/json" style="display:none" onchange="V547Core.importFile(this.files[0])"><div class="card"><h2>Storage V547 CLEAN</h2><div id="sum"></div></div><div class="card"><table><thead><tr><th>Chave</th><th>Tamanho</th></tr></thead><tbody id="rows"></tbody></table></div><script>const i=V547Core.storageInfo();sum.innerHTML='<b>Total:</b> '+i.mb+' MB';rows.innerHTML=i.rows.map(r=>'<tr><td>'+r.key+'</td><td>'+r.chars+'</td></tr>').join('')</script></body></html>
