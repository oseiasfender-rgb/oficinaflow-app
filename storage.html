<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>OficinaOS V546.42 — Storage</title><style>body{font:14px Arial;background:#fbf7f1;color:#24160d;margin:0}.top{padding:12px;background:#fffaf4;border-bottom:1px solid #ead7c4;display:flex;gap:8px;align-items:center}.logo{background:#a95510;color:white;padding:8px;border-radius:6px;font-weight:900}.btn{border:1px solid #dcb990;background:#fffaf4;border-radius:7px;padding:8px 10px;font-weight:700;text-decoration:none;color:#24160d;cursor:pointer}.red{background:#ffecec;color:#b91c1c}.green{background:#e8fff1;color:#087e3d}.main{padding:18px}.panel{background:#fffaf4;border:1px solid #ead7c4;border-radius:12px;padding:16px;margin-bottom:14px}table{width:100%;border-collapse:collapse;background:white}td,th{padding:8px;border-bottom:1px solid #ead7c4;text-align:left}th{background:#fff2e6}pre{background:#21160f;color:white;border-radius:8px;padding:12px;overflow:auto}</style></head><body><div class="top"><div class="logo">OS</div><b>OFICINAOS V546.42 STORAGE HOTFIX</b><a class="btn" href="index.html">Painel</a><a class="btn" href="clientes.html">Clientes</a><a class="btn" href="diagnostico.html">Diagnóstico</a></div><main class="main"><section class="panel"><h2>Storage Fragmentado</h2><p>Clientes e veículos agora ficam separados. Relatórios, KPIs e IA não são salvos como STATE gigante.</p><button class="btn green" onclick="exportar()">Exportar backup leve</button><button class="btn" onclick="file.click()">Importar backup</button><button class="btn red" onclick="limpar()">Limpar tudo</button><input id="file" type="file" accept=".json,application/json" style="display:none"></section><section class="panel"><h3>Uso do localStorage</h3><div id="summary"></div><table><thead><tr><th>Chave</th><th>Tamanho aproximado</th></tr></thead><tbody id="rows"></tbody></table></section><section class="panel"><h3>Estado atual</h3><pre id="raw"></pre></section></main><script src="oficinaos-state.js?v=54642"></script><script>function render(){const info=OFICINAOS_STORAGE.storageInfo(),s=OFICINAOS_STORAGE.load();summary.innerHTML='<b>Total aproximado:</b> '+info.approxMB+' MB';rows.innerHTML=info.rows.map(r=>'<tr><td>'+r.key+'</td><td>'+r.chars+' caracteres</td></tr>').join('');raw.textContent=JSON.stringify({clientes:s.clientes.length,veiculos:s.veiculos.length,lancamentos:s.financeiro.lancamentos.length,orcamentos:s.orcamentos.length,agenda:s.agenda.length},null,2)}function exportar(){const backup=OFICINAOS_STORAGE.exportBackup();const blob=new Blob([JSON.stringify(backup,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='oficinaos_v54642_backup_leve.json';a.click();URL.revokeObjectURL(a.href);render()}file.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{OFICINAOS_STORAGE.importBackup(JSON.parse(ev.target.result));render();alert('Importado.')}catch(err){alert('Erro: '+err.message)}};r.readAsText(f)}function limpar(){if(prompt('Digite LIMPAR para apagar dados')!=='LIMPAR')return;OFICINAOS_STORAGE.clearAll();render()}render();</script></body></html>
