<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>OficinaOS — Configurações</title>
<style>
:root{--line:rgba(100,60,20,.14);--gold:#b8621a;--green:#16a34a;--red:#dc2626;--blue:#1d6fa4;--text:#2c1a08;--muted:#76533a}
*{box-sizing:border-box}body{margin:0;background:linear-gradient(135deg,#fbf7f1,#f2eadf);font-family:Arial,sans-serif;color:var(--text)}
.top{height:58px;display:flex;align-items:center;gap:14px;padding:0 18px;background:linear-gradient(180deg,#fff,#faf5ee);border-bottom:1px solid var(--line);box-shadow:0 2px 10px rgba(150,80,20,.08);position:sticky;top:0;z-index:99}
.logo{width:34px;height:34px;border-radius:6px;background:#b8621a;color:white;display:flex;align-items:center;justify-content:center;font-weight:900}
.brand b{letter-spacing:.12em;font-size:18px}.brand small{display:block;font-size:10px;letter-spacing:.22em;color:#b8621a}
.nav{display:flex;gap:4px;flex-wrap:wrap;margin-left:auto}.nav a{border:1px solid transparent;background:transparent;border-radius:7px;padding:8px 10px;text-decoration:none;color:#5a3a1a;font:700 13px Arial}.nav a.active,.nav a:hover{background:rgba(184,98,26,.10);border-color:rgba(184,98,26,.28);color:#b8621a}
.actions{display:flex;gap:6px}.actions button,.actions label,.btn{border:1px solid var(--line);background:#fff;border-radius:7px;padding:8px 10px;font:700 12px Arial;cursor:pointer;color:#2c1a08}.actions .primary,.primary{background:#b8621a;color:white;border-color:#b8621a}
.main{max-width:1280px;margin:auto;padding:22px}.hero{display:flex;justify-content:space-between;gap:14px;align-items:end;margin:18px 0}.hero h1{margin:0;font-size:28px}.hero p{color:var(--muted)}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}.card{background:#fffaf4;border:1px solid var(--line);border-radius:13px;padding:15px;box-shadow:0 2px 10px rgba(150,80,20,.07)}
.table{width:100%;border-collapse:collapse;background:#fff}.table th,.table td{padding:8px;border-bottom:1px solid #ead7c4;text-align:left}.table th{background:#fff1df;color:#744113;font-size:11px}.num{text-align:right;font-weight:700}
input,select,textarea{border:1px solid #dcb990;background:#fffaf4;border-radius:7px;padding:9px;width:100%;margin:4px 0 10px}label{font-size:12px;color:#76533a;font-weight:700}
@media(max-width:900px){.grid,.grid2{grid-template-columns:1fr}.top{height:auto;flex-wrap:wrap;padding:10px}.nav{width:100%;margin-left:0}}

/* V547.29 — Responsividade / Validação visual */
:root{
  --v547-safe-bottom: 84px;
}
html,body{
  max-width:100%;
  overflow-x:hidden;
}
img,video,canvas,svg{
  max-width:100%;
}
input,select,textarea,button{
  max-width:100%;
}
table{
  width:100%;
}
.v547-scroll,
.table-wrap,
.card:has(table){
  overflow-x:auto;
}
#pixFloat,.pix-float,.fab,.floating-pix,[data-pix-float]{
  position:fixed!important;
  right:22px!important;
  bottom:22px!important;
  z-index:9999!important;
}
body{
  padding-bottom:var(--v547-safe-bottom);
}
@media (max-width: 1180px){
  .main,.container,.app,.wrap{
    max-width:100%!important;
    padding-left:14px!important;
    padding-right:14px!important;
  }
  .grid,.grid2,.grid3,.grid4,.cards,.kpis{
    grid-template-columns:repeat(2,minmax(0,1fr))!important;
  }
  aside,.side,.right-panel,.sidebar-right{
    width:auto!important;
  }
}
@media (max-width: 820px){
  .top,.topbar,.header{
    height:auto!important;
    min-height:56px!important;
    flex-wrap:wrap!important;
    gap:8px!important;
    padding:10px!important;
  }
  .brand small{
    display:none!important;
  }
  .nav,.tabs,.menu{
    width:100%!important;
    overflow-x:auto!important;
    white-space:nowrap!important;
    flex-wrap:nowrap!important;
    padding-bottom:4px!important;
  }
  .nav a,.tabs button,.menu button{
    flex:0 0 auto!important;
    font-size:12px!important;
    padding:8px 9px!important;
  }
  .main,.container,.app,.wrap{
    padding:12px!important;
  }
  .hero{
    display:block!important;
  }
  .grid,.grid2,.grid3,.grid4,.cards,.kpis{
    grid-template-columns:1fr!important;
  }
  .card,.panel,.box{
    border-radius:12px!important;
    padding:12px!important;
  }
  .kpi strong,.metric strong{
    font-size:24px!important;
  }
  .layout,.workspace,.page-grid,.content-grid{
    display:block!important;
  }
  aside,.side,.right-panel,.sidebar,.sidebar-right,.summary,.resumo{
    width:100%!important;
    max-width:100%!important;
    position:relative!important;
    top:auto!important;
    right:auto!important;
    height:auto!important;
    max-height:none!important;
    margin-top:12px!important;
  }
  .calendar,.calendario{
    min-width:680px!important;
  }
  .calendar-wrap,.calendario-wrap,.agenda-grid{
    overflow-x:auto!important;
  }
  table{
    font-size:12px!important;
  }
  th,td{
    padding:7px!important;
  }
  #pixFloat,.pix-float,.fab,.floating-pix,[data-pix-float]{
    width:56px!important;
    height:56px!important;
    right:16px!important;
    bottom:16px!important;
  }
}
@media (max-width: 520px){
  body{
    font-size:14px!important;
  }
  .logo{
    width:34px!important;
    height:34px!important;
  }
  .brand b{
    font-size:15px!important;
    letter-spacing:.08em!important;
  }
  h1{
    font-size:23px!important;
  }
  h2{
    font-size:19px!important;
  }
  .btn,button,label{
    min-height:38px!important;
  }
  input,select,textarea{
    font-size:16px!important;
  }
}
@media print{
  body{
    background:#fff!important;
    padding:0!important;
  }
  .top,.topbar,.header,.nav,.tabs,.menu,#pixFloat,.pix-float,.fab,.floating-pix,[data-pix-float],button,.actions{
    display:none!important;
  }
  .main,.container,.app,.wrap{
    max-width:100%!important;
    padding:0!important;
  }
  .card,.panel,.box{
    box-shadow:none!important;
    break-inside:avoid;
  }
}

</style>
<link rel="stylesheet" href="heritage-layout-v54728.css">
<link rel="stylesheet" href="design-unification-v54729.css">
</head><body><header class="top"><div class="logo">OS</div><div class="brand"><b>OFICINAOS</b><small>Gestão Inteligente</small></div><nav class="nav"><a class="" href="index.html">Painel</a><a class="" href="orcamento.html">Orçamento</a><a class="" href="financeiro.html">Financeiro</a><a class="" href="agenda.html">Agenda</a><a class="" href="clientes.html">Clientes</a><a class="" href="relatorios.html">Relatórios</a><a class="" href="metas.html">Metas</a><a class="" href="ia.html">IA</a><a class="active" href="configuracoes.html">Configurações</a><a class="" href="auditoria.html">Auditoria</a><a href="alertas.html">Alertas</a><a href="busca.html">Busca</a><a href="preferencias.html">Preferências</a><a href="dashboard-operacional.html">Operacional</a><a href="fotos-os.html">Fotos OS</a></nav><div class="actions"><label>Importar<input id="v547Import" type="file" accept=".json,application/json" style="display:none"></label><button id="v547Backup" class="primary">Backup</button></div></header><main class="main">
<section class="hero"><div><h1>Configurações</h1><p>Dados centrais da empresa, financeiro, documentos e sistema.</p></div><button class="primary" id="salvar">Salvar configurações</button></section>
<section class="grid2">
<div class="card"><h3>Empresa</h3><label>Nome</label><input id="empresaNome"><label>Responsável</label><input id="responsavel"><label>CNPJ</label><input id="cnpj"></div>
<div class="card"><h3>Contato</h3><label>Telefone</label><input id="telefone"><label>WhatsApp</label><input id="whatsapp"><label>E-mail</label><input id="email"></div>
<div class="card"><h3>Endereço</h3><label>Logradouro</label><input id="logradouro"><label>Número</label><input id="numero"><label>Cidade</label><input id="cidade"><label>Estado</label><input id="estado"><label>CEP</label><input id="cep"></div>
<div class="card"><h3>Financeiro</h3><label>Hora técnica</label><input id="horaTecnica" type="number"><label>Pró-labore</label><input id="proLabore" type="number"><label>Ponto de equilíbrio</label><input id="pontoEquilibrio" type="number"><label>Meta mensal</label><input id="metaMensal" type="number"></div>
<div class="card"><h3>Documentos</h3><label>PIX</label><input id="pix"><label>Assinatura</label><input id="assinatura"><label>Rodapé PDF</label><textarea id="rodape"></textarea></div>
<div class="card"><h3>Sistema</h3><label>Tema</label><select id="tema"><option value="claro">Claro</option><option value="escuro">Escuro</option></select><label>Backup automático</label><select id="backupAutomatico"><option value="true">Ativo</option><option value="false">Inativo</option></select></div>
</section>
</main><script src="oficinaos-v547-idb-core.js?v=54729"></script><script>
async function carregar(){
 const c=await OficinaOS.carregarConfiguracoes();
 empresaNome.value=c.empresa?.nome||''; responsavel.value=c.empresa?.responsavel||''; cnpj.value=c.empresa?.cnpj||'';
 telefone.value=c.contato?.telefone||''; whatsapp.value=c.contato?.whatsapp||''; email.value=c.contato?.email||'';
 logradouro.value=c.endereco?.logradouro||''; numero.value=c.endereco?.numero||''; cidade.value=c.endereco?.cidade||''; estado.value=c.endereco?.estado||''; cep.value=c.endereco?.cep||'';
 horaTecnica.value=c.financeiro?.horaTecnica||55; proLabore.value=c.financeiro?.proLabore||6000; pontoEquilibrio.value=c.financeiro?.pontoEquilibrio||3000; metaMensal.value=c.financeiro?.metaMensal||10000;
 pix.value=c.documentos?.pix||''; assinatura.value=c.documentos?.assinatura||''; rodape.value=c.documentos?.rodape||'';
 tema.value=c.sistema?.tema||'claro'; backupAutomatico.value=String(c.sistema?.backupAutomatico!==false);
}
salvar.onclick=async()=>{
 await OficinaOS.salvarConfiguracoes({
  id:'main',
  empresa:{nome:empresaNome.value,responsavel:responsavel.value,cnpj:cnpj.value},
  contato:{telefone:telefone.value,whatsapp:whatsapp.value,email:email.value},
  endereco:{logradouro:logradouro.value,numero:numero.value,cidade:cidade.value,estado:estado.value,cep:cep.value},
  financeiro:{horaTecnica:OficinaOS.n(horaTecnica.value),proLabore:OficinaOS.n(proLabore.value),pontoEquilibrio:OficinaOS.n(pontoEquilibrio.value),metaMensal:OficinaOS.n(metaMensal.value)},
  documentos:{pix:pix.value,assinatura:assinatura.value,rodape:rodape.value},
  sistema:{tema:tema.value,backupAutomatico:backupAutomatico.value==='true'}
 });
 alert('Configurações salvas.');
};
carregar();
</script><div class="footer-v54729"></div>
</body></html>
