<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>OficinaOS Clean Test</title>
<style>body{font:14px Arial;background:#fbf7f1;color:#24160d;padding:24px}.box{max-width:720px;background:#fffaf4;border:1px solid #ead7c4;border-radius:12px;padding:20px}.btn{border:1px solid #dcb990;background:#a95510;color:white;border-radius:8px;padding:10px 14px;font-weight:700;cursor:pointer;text-decoration:none;display:inline-block;margin:4px}.red{background:#b91c1c}</style>
</head><body><div class="box"><h1>OficinaOS V546.30 CLEAN TEST</h1><p>Use esta tela para limpar o ambiente antes de importar um backup real.</p><button class="btn red" onclick="limpar()">Limpar todos os dados locais</button><a class="btn" href="index.html">Voltar ao painel</a><a class="btn" href="diagnostico.html">Abrir diagnóstico</a></div>
<script>
function limpar(){
 if(prompt('Digite LIMPAR para apagar dados locais')!=='LIMPAR')return;
 Object.keys(localStorage).forEach(k=>{
  if(k.toLowerCase().includes('oficinaos')||k==='ALL_TX'||k==='STATE'||k==='CLIENTES'||k==='AGENDA'||k==='ORCAMENTOS'||k==='clientes'||k==='agenda'||k==='orcamentos')localStorage.removeItem(k);
 });
 alert('Ambiente limpo. Importe o backup real no painel.');
 location.href='index.html';
}
</script></body></html>
