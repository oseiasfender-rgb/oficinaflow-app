<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>OficinaOS — Busca Global</title>
<style>
:root{--line:rgba(100,60,20,.14);--gold:#b8621a;--green:#16a34a;--red:#dc2626;--blue:#1d6fa4;--text:#2c1a08;--muted:#76533a}
*{box-sizing:border-box}body{margin:0;background:linear-gradient(135deg,#fbf7f1,#f2eadf);font-family:Arial,sans-serif;color:var(--text)}
.top{height:58px;display:flex;align-items:center;gap:14px;padding:0 18px;background:linear-gradient(180deg,#fff,#faf5ee);border-bottom:1px solid var(--line);box-shadow:0 2px 10px rgba(150,80,20,.08);position:sticky;top:0;z-index:99}
.logo{width:34px;height:34px;border-radius:6px;background:#b8621a;color:white;display:flex;align-items:center;justify-content:center;font-weight:900}
.brand b{letter-spacing:.12em;font-size:18px}.brand small{display:block;font-size:10px;letter-spacing:.22em;color:#b8621a}
.nav{display:flex;gap:4px;flex-wrap:wrap;margin-left:auto}.nav a{border:1px solid transparent;background:transparent;border-radius:7px;padding:8px 10px;text-decoration:none;color:#5a3a1a;font:700 13px Arial}.nav a.active,.nav a:hover{background:rgba(184,98,26,.10);border-color:rgba(184,98,26,.28);color:#b8621a}
.actions{display:flex;gap:6px}.actions button,.actions label,.btn{border:1px solid var(--line);background:#fff;border-radius:7px;padding:8px 10px;font:700 12px Arial;cursor:pointer;color:#2c1a08}.actions .primary,.primary{background:#b8621a;color:white;border-color:#b8621a}
.main{max-width:1280px;margin:auto;padding:22px}.hero{display:flex;justify-content:space-between;gap:14px;align-items:end;margin:18px 0}.hero h1{margin:0;font-size:28px}.hero p{color:var(--muted)}
.card{background:#fffaf4;border:1px solid var(--line);border-radius:13px;padding:15px;box-shadow:0 2px 10px rgba(150,80,20,.07)}.search{font-size:20px;padding:14px 16px;border:1px solid #dcb990;background:#fffaf4;border-radius:12px;width:100%;margin:4px 0 10px}
.table{width:100%;border-collapse:collapse;background:#fff}.table th,.table td{padding:9px;border-bottom:1px solid #ead7c4;text-align:left}.table th{background:#fff1df;color:#744113;font-size:11px}.num{text-align:right;font-weight:700}
.badge{border-radius:99px;padding:4px 8px;font-size:12px;font-weight:700;background:#fff6da;color:#9a6200;display:inline-block}
@media(max-width:900px){.top{height:auto;flex-wrap:wrap;padding:10px}.nav{width:100%;margin-left:0}}

/* V547.27 — Responsividade / Validação visual */
:root{
  --v547-safe-bottom: 84px;
}
html,body{
  max-width:100%;
  overflow-x:hidden;
}
img,video,canvas,svg{
  max-width:100%;
}
input,select,textarea,button{
  max-width:100%;
}
table{
  width:100%;
}
.v547-scroll,
.table-wrap,
.card:has(table){
  overflow-x:auto;
}
#pixFloat,.pix-float,.fab,.floating-pix,[data-pix-float]{
  position:fixed!important;
  right:22px!important;
  bottom:22px!important;
  z-index:9999!important;
}
body{
  padding-bottom:var(--v547-safe-bottom);
}
@media (max-width: 1180px){
  .main,.container,.app,.wrap{
    max-width:100%!important;
    padding-left:14px!important;
    padding-right:14px!important;
  }
  .grid,.grid2,.grid3,.grid4,.cards,.kpis{
    grid-template-columns:repeat(2,minmax(0,1fr))!important;
  }
  aside,.side,.right-panel,.sidebar-right{
    width:auto!important;
  }
}
@media (max-width: 820px){
  .top,.topbar,.header{
    height:auto!important;
    min-height:56px!important;
    flex-wrap:wrap!important;
    gap:8px!important;
    padding:10px!important;
  }
  .brand small{
    display:none!important;
  }
  .nav,.tabs,.menu{
    width:100%!important;
    overflow-x:auto!important;
    white-space:nowrap!important;
    flex-wrap:nowrap!important;
    padding-bottom:4px!important;
  }
  .nav a,.tabs button,.menu button{
    flex:0 0 auto!important;
    font-size:12px!important;
    padding:8px 9px!important;
  }
  .main,.container,.app,.wrap{
    padding:12px!important;
  }
  .hero{
    display:block!important;
  }
  .grid,.grid2,.grid3,.grid4,.cards,.kpis{
    grid-template-columns:1fr!important;
  }
  .card,.panel,.box{
    border-radius:12px!important;
    padding:12px!important;
  }
  .kpi strong,.metric strong{
    font-size:24px!important;
  }
  .layout,.workspace,.page-grid,.content-grid{
    display:block!important;
  }
  aside,.side,.right-panel,.sidebar,.sidebar-right,.summary,.resumo{
    width:100%!important;
    max-width:100%!important;
    position:relative!important;
    top:auto!important;
    right:auto!important;
    height:auto!important;
    max-height:none!important;
    margin-top:12px!important;
  }
  .calendar,.calendario{
    min-width:680px!important;
  }
  .calendar-wrap,.calendario-wrap,.agenda-grid{
    overflow-x:auto!important;
  }
  table{
    font-size:12px!important;
  }
  th,td{
    padding:7px!important;
  }
  #pixFloat,.pix-float,.fab,.floating-pix,[data-pix-float]{
    width:56px!important;
    height:56px!important;
    right:16px!important;
    bottom:16px!important;
  }
}
@media (max-width: 520px){
  body{
    font-size:14px!important;
  }
  .logo{
    width:34px!important;
    height:34px!important;
  }
  .brand b{
    font-size:15px!important;
    letter-spacing:.08em!important;
  }
  h1{
    font-size:23px!important;
  }
  h2{
    font-size:19px!important;
  }
  .btn,button,label{
    min-height:38px!important;
  }
  input,select,textarea{
    font-size:16px!important;
  }
}
@media print{
  body{
    background:#fff!important;
    padding:0!important;
  }
  .top,.topbar,.header,.nav,.tabs,.menu,#pixFloat,.pix-float,.fab,.floating-pix,[data-pix-float],button,.actions{
    display:none!important;
  }
  .main,.container,.app,.wrap{
    max-width:100%!important;
    padding:0!important;
  }
  .card,.panel,.box{
    box-shadow:none!important;
    break-inside:avoid;
  }
}

</style>
</head><body><header class="top"><div class="logo">OS</div><div class="brand"><b>OFICINAOS</b><small>Gestão Inteligente</small></div><nav class="nav"><a class="" href="index.html">Painel</a><a class="" href="orcamento.html">Orçamento</a><a class="" href="financeiro.html">Financeiro</a><a class="" href="agenda.html">Agenda</a><a class="" href="clientes.html">Clientes</a><a class="" href="relatorios.html">Relatórios</a><a class="" href="metas.html">Metas</a><a class="" href="ia.html">IA</a><a class="active" href="busca.html">Busca</a><a class="" href="alertas.html">Alertas</a><a class="" href="configuracoes.html">Configurações</a><a class="" href="auditoria.html">Auditoria</a><a href="preferencias.html">Preferências</a><a href="dashboard-operacional.html">Operacional</a><a href="fotos-os.html">Fotos OS</a></nav><div class="actions"><label>Importar<input id="v547Import" type="file" accept=".json,application/json" style="display:none"></label><button id="v547Backup" class="primary">Backup</button></div></header><main class="main">
<section class="hero"><div><h1>Busca Global</h1><p>Encontre clientes, placas, OS, orçamentos, contas, lançamentos e auditoria.</p></div></section>
<section class="card"><input class="search" id="q" placeholder="Pesquisar por cliente, placa, serviço, conta, valor..." autofocus><div id="status"></div></section>
<section class="card" style="margin-top:12px"><table class="table" id="tabela"></table></section>
</main><script src="oficinaos-v547-idb-core.js?v=54727"></script><script>
async function render(){
 const termo=q.value.trim();
 if(!termo){status.innerHTML='Digite ao menos uma palavra.';tabela.innerHTML='';return;}
 const r=await OficinaOS.buscaGlobal(termo);
 status.innerHTML='<b>'+r.length+'</b> resultado(s) encontrado(s).';
 tabela.innerHTML='<tr><th>Tipo</th><th>Título</th><th>Detalhe</th><th>Valor</th><th>Abrir</th></tr>'+r.map(x=>'<tr><td><span class="badge">'+x.tipo+'</span></td><td><b>'+x.titulo+'</b><br><small>'+x.subtitulo+'</small></td><td>'+x.detalhe+'</td><td class="num">'+(x.valor?OficinaOS.money(x.valor):'')+'</td><td><a href="'+x.url+'">Abrir</a></td></tr>').join('');
}
q.oninput=()=>{clearTimeout(window._t);window._t=setTimeout(render,180);};
</script></body></html>
