nt-family:Georgia,serif;color:#c55a13;font-style:italic;font-weight:400;margin:8px 0}.quick{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:14px}.chip{border:1px solid #dcb990;background:#fffaf4;border-radius:999px;padding:6px 10px;font-size:11px;cursor:pointer}.chip:hover{background:#fff0df}.chatbar{position:fixed;left:165px;right:310px;bottom:0;background:#fff6ed;border-top:1px solid var(--line);padding:10px 18px;display:flex;gap:8px;z-index:4}.chatbar textarea{flex:1;min-height:34px;max-height:80px;resize:vertical;border:1px solid #dcb990;background:#fffaf4;border-radius:4px;padding:9px;font:12px Arial}.btn{border:1px solid #dcb990;background:#fffaf4;border-radius:5px;padding:8px 12px;cursor:pointer;font-weight:700}.btn.primary{background:var(--brown);color:#fff}.result{max-width:760px;margin:0 auto;background:#fff;border:1px solid var(--line);border-radius:8px;padding:14px;line-height:1.55;white-space:pre-wrap;min-height:140px}.hidden{display:none}.badge{display:inline-flex;padding:3px 8px;border-radius:999px;font-size:11px;border:1px solid #ddd;margin:2px}.ok{background:#e8fff1;color:#087e3d}.warn{background:#fff6da;color:#9a6200}.bad{background:#ffecec;color:#b50f17}.info{background:#eaf4ff;color:#075c9b}.item{background:#fff;border:1px solid var(--line);border-radius:8px;padding:10px;margin-bottom:8px}.muted{color:#7b6049;font-size:11px;line-height:1.45}@media(max-width:1000px){.main{grid-template-columns:1fr}.left,.side{border:0}.kpis{grid-template-columns:1fr}.chatbar{left:0;right:0}.nav{overflow:auto;justify-content:flex-start}.centerBox{margin:20px auto}}

<script>
(function(){
"use strict";
const memory=new Map();
window.OficinaStore={
  getItem:key=>memory.has(String(key))?memory.get(String(key)):null,
  setItem:(key,value)=>{memory.set(String(key),String(value));return true},
  removeItem:key=>memory.delete(String(key)),
  clear:()=>memory.clear(),
  key:index=>Array.from(memory.keys())[index]||null,
  get length(){return memory.size}
};
})();
</script>

<body>
<header class="top"><div class="brand"><div class="logo">OS</div><div><b>OFICINAOS</b><small>GESTÃO AUTOMOTIVA</small></div></div><nav class="nav"><button>📊 Financeiro</button><button>🧾 Orçamento</button><button>🚨 Contas</button><button>🎯 Metas</button><button>📅 Agenda</button><button>👥 Clientes</button><button>📈 Relatórios</button><button class="active">🤖 IA</button></nav><button class="btn" id="btnTest">🛡 Validar</button></header>

<aside class="left"><div class="groupTitle">TÉCNICA</div><div class="menu"><button class="active" data-mod="livre">🖊 Consulta Livre</button><button data-mod="restauracao">🏁 Restauração</button><button data-mod="pintura">🎨 Pintura & Acabamento</button><button data-mod="solda">⚡ Solda TIG/MIG</button><button data-mod="equipamentos">🛠 Equipamentos</button></div><div class="groupTitle">NEGÓCIO</div><div class="menu"><button data-mod="precificacao">💰 Precificação MEI</button><button data-mod="clientes">🤝 Gestão de Clientes</button><button data-mod="materiais">🧪 Materiais/Insumos</button><button data-mod="simulador">📊 Simulador</button></div><div class="groupTitle">CHECKLISTS</div><div class="menu"><button data-mod="desmontagem">📋 Desmontagem</button><button data-mod="entrega">✅ Montagem & Entrega</button></div></aside>

<div class="chatbar"><div class="quick" id="quickBottom"></div><textarea id="prompt" placeholder="Faça sua pergunta técnica, de gestão, materiais ou PNL..."></textarea><button class="btn primary" id="send">➤</button></div>
<script>
(function(){
const $=id=>document.getElementById(id);const br=v=>Number(v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});const KEY='oficinaos_v546_20_1_ia_hibrida';let active='livre';let state={history:[],memory:[]};
const data={materiais:[],orcamentos:[],agenda:[],financeiro:{receitas:0,despesas:0,pe:0},clientes:[]};
const quick=['Como precificar restauração completa?','Plano técnico de restauração em painel','Explicar orçamento alto padrão ao cliente','Configurar pistola HVLP','Checklist de entrega','Quanto material preciso para 2 portas?','Simular hora técnica R$65','Mensagem de pós-venda'];
function load(){try{state=JSON.parse(OficinaStore.getItem(KEY))||state}catch(e){}render()}function save(){OficinaStore.setItem(KEY,JSON.stringify(state))}
function render(){const lucro=data.financeiro.receitas-data.financeiro.despesas;$('kpis').innerHTML=[['OS abertas',data.agenda.filter(x=>x.status!=='Finalizada').length],['OS atrasada',data.agenda.filter(x=>x.status==='Atrasada').length],['Clientes',data.clientes.length],['Faturamento',br(data.financeiro.receitas)],['Lucro',br(lucro)],['Estoque crítico',data.materiais.filter(x=>x.critico).length]].map(k=>'<div class="kpi"><small>'+k[0]+'</small><strong>'+k[1]+'</strong></div>').join('');$('quickTop').innerHTML=quick.slice(0,8).map(q=>'<button class="chip" onclick="ask(\''+q.replace(/'/g,'')+'\')">'+q+'</button>').join('');$('quickBottom').innerHTML=quick.slice(0,5).map(q=>'<button class="chip" onclick="ask(\''+q.replace(/'/g,'')+'\')">'+q+'</button>').join('');$('memory').innerHTML=state.memory.map(m=>'<div class="item"><b>'+m.titulo+'</b><br><span class="muted">'+m.info+'</span></div>').join('');$('materials').innerHTML=data.materiais.map(m=>'<div class="item"><b>'+m.nome+'</b><br><span class="badge '+(m.critico?'warn':'ok')+'">'+m.saldo+'</span></div>').join('');$('posvenda').innerHTML=data.clientes.slice(0,3).map(c=>'<div class="item"><b>'+c+'</b><br><span class="muted">Sugestão: follow-up em 7 dias.</span></div>').join('');$('history').innerHTML=state.history.slice().reverse().map(h=>'<div class="item"><b>'+h.mod+'</b><br><span class="muted">'+h.q+'</span></div>').join('')||'<p class="muted">Nenhuma consulta ainda.</p>'}
window.ask=q=>{$('prompt').value=q;run()};
function resposta(q){
let base='Consulta: '+q+'\\n\\n';
if(active==='materiais'||/material|verniz|primer|base|lixa/i.test(q))return base+'Sem estoque real conectado. Cadastre materiais reais para a IA calcular consumo, alerta de compra e criticidade.';
if(active==='precificacao'||/preço|precificar|valor|hora/i.test(q))return base+'Precificação limpa:\\n\\nUse: horas técnicas + materiais reais + terceiros + margem + risco.\\n\\nSem histórico real conectado, não gero exemplo com cliente, veículo ou valor fictício.';
if(active==='restauracao'||/restauração|painel|completa/i.test(q))return base+'Plano técnico de restauração:\\n1. Fotos e diagnóstico\\n2. Desmontagem\\n3. Decapagem/lixamento\\n4. Funilaria estrutural\\n5. Solda e alinhamento\\n6. Preparação\\n7. Pintura\\n8. Montagem\\n9. Polimento\\n10. Entrega documentada';
if(active==='clientes'||/cliente|pós|retorno/i.test(q))return base+'Sem clientes reais conectados. Quando houver cadastro, a IA poderá sugerir follow-up, retorno e histórico.';
if(active==='simulador'||/simular|contratar|aumentar/i.test(q))return base+'Simulador limpo: conecte receitas, despesas, ponto de equilíbrio e horas reais para gerar cenário.';
if(active==='pintura'||/pintura|hvlp|casca/i.test(q))return base+'Pintura e acabamento: conferir pressão, viscosidade, distância, sobreposição, tempo entre demãos e condição da superfície.';
if(active==='solda'||/solda|mig|tig/i.test(q))return base+'Solda TIG/MIG: em chapa fina, usar pontos alternados, controle de calor e resfriamento para evitar empeno.';
return base+'Resposta operacional limpa:\\n- Identificar serviço.\\n- Estimar horas.\\n- Conferir materiais reais.\\n- Calcular margem.\\n- Registrar histórico.\\n\\nA IA não usa dados fictícios.';
}
function run(){let q=$('prompt').value.trim()||'Consulta operacional geral';let mod=document.querySelector('.menu button.active')?.textContent.trim()||'Consulta';$('intro').classList.add('hidden');$('result').classList.remove('hidden');$('result').textContent=resposta(q);state.history.push({mod,q});save();render()}
$('send').onclick=run;document.querySelectorAll('.menu button').forEach(b=>b.onclick=()=>{document.querySelectorAll('.menu button').forEach(x=>x.classList.remove('active'));b.classList.add('active');active=b.dataset.mod});$('btnTest').onclick=()=>alert('✅ Menu antigo preservado\\n✅ Sem exemplos pré-carregados\\n✅ Resumo operacional ativo\\n✅ Materiais críticos aguardando dados reais\\n✅ Memória técnica limpa\\n✅ Consulta funcionando');load();
})();
</script>

<script>
(function(){
"use strict";
function send(type,payload){parent.postMessage({source:"oficinaos-module",module:"ia",type,payload},"*")}

function navName(text){
  text=String(text||"").toLowerCase();
  if(text.includes("orçamento"))return"orcamento";
  if(text.includes("financeiro"))return"financeiro";
  if(text.includes("agenda"))return"agenda";
  if(text.includes("cliente"))return"clientes";
  if(text.includes("meta"))return"metas";
  if(text.includes("relatório"))return"relatorios";
  if(text.includes("ia"))return"ia";
  return null;
}
document.addEventListener("click",e=>{
  const b=e.target.closest(".nav button,.nav-tab,.tab");
  if(!b)return;
  const n=navName(b.textContent);
  if(n&&n!=="ia"){
    e.preventDefault();e.stopImmediatePropagation();
    send("navigate",n);
  }
},true);

const oldSave=save;
save=function(){oldSave();send("ia:update",{history:state.history||[],memory:state.memory||[]})};
window.addEventListener("message",e=>{
  const m=e.data||{};
  if(m.source!=="oficinaos-core"||m.type!=="core:state")return;
  const s=m.payload||{};
  data.clientes=Array.isArray(s.clientes)?s.clientes:[];
  data.orcamentos=Array.isArray(s.orcamentos)?s.orcamentos:[];
  data.agenda=s.agenda&&Array.isArray(s.agenda.os)?s.agenda.os:[];
  const l=s.financeiro&&Array.isArray(s.financeiro.lancamentos)?s.financeiro.lancamentos:[];
  data.financeiro.receitas=l.filter(x=>x.tipo==="receita"&&String(x.status).toLowerCase()==="pago").reduce((a,x)=>a+Number(x.valor||0),0);
  data.financeiro.despesas=l.filter(x=>x.tipo==="despesa"&&String(x.status).toLowerCase()==="pago").reduce((a,x)=>a+Number(x.valor||0),0);
  if(s.ia){
    state.history=Array.isArray(s.ia.history)?s.ia.history:[];
    state.memory=Array.isArray(s.ia.memory)?s.ia.memory:[];
  }
  render();
});
send("module:ready",{});
})();
</script>

<script>(function(){window.addEventListener('message',e=>{const m=e.data||{};if(m.source==='oficinaos-v700'&&m.type==='STATE_CHANGED'){window.OFICINAOS_V700_STATE=m.payload.state;window.dispatchEvent(new CustomEvent('oficinaos:v700-state',{detail:m.payload.state}))}});window.OficinaOSModule700={send:(type,payload)=>parent.postMessage({source:'oficinaos-module-v700',type,payload},'*')};})();</script><script>(function(){const MODULE=(location.pathname.split('/').pop()||'').replace('.html','');let seq=0;const pending=new Map();function request(type,payload){return new Promise((resolve,reject)=>{const requestId='REQ-'+Date.now().toString(36)+'-'+(++seq);pending.set(requestId,{resolve,reject});parent.postMessage({source:'oficinaos-module-v700',module:MODULE,type,requestId,payload:payload||{}},'*');setTimeout(()=>{if(pending.has(requestId)){pending.delete(requestId);reject(Error('CORE V700 não respondeu'))}},10000)})}function replaceModule(payload){parent.postMessage({source:'oficinaos-module-v700',module:MODULE,type:'MODULE_REPLACE',payload:payload||{}},'*')}function navigate(module,command){parent.postMessage({source:'oficinaos-module-v700',module:MODULE,type:'NAVIGATE',payload:{module,command:command||null}},'*')}window.addEventListener('message',e=>{const m=e.data||{};if(m.source!=='oficinaos-v700')return;if(m.type==='RESPONSE'&&pending.has(m.requestId)){pending.get(m.requestId).resolve(m.payload);pending.delete(m.requestId)}if(m.type==='ERROR'&&pending.has(m.requestId)){pending.get(m.requestId).reject(Error(m.payload&&m.payload.message||'Erro no CORE'));pending.delete(m.requestId)}if(m.type==='STATE_CHANGED'){window.OFICINAOS_V700_STATE=m.payload&&m.payload.state||{};window.OFICINA_STATE=window.OFICINAOS_V700_STATE;window.dispatchEvent(new CustomEvent('oficinaos:v700-state',{detail:window.OFICINAOS_V700_STATE}))}if(m.type==='COMMAND')window.dispatchEvent(new CustomEvent('oficinaos:v700-command',{detail:m.payload||{}}))});window.OficinaOSModule700={request,replaceModule,navigate,module:MODULE};parent.postMessage({source:'oficinaos-module-v700',module:MODULE,type:'MODULE_READY',payload:{}},'*')})();</script><script>window.addEventListener('oficinaos:v700-state',e=>{const s=e.detail||{};try{data.clientes=Array.isArray(s.clientes)?s.clientes:[];data.orcamentos=Array.isArray(s.orcamentos)?s.orcamentos:[];data.agenda=s.agenda&&Array.isArray(s.agenda.os)?s.agenda.os:[];const l=s.financeiro&&Array.isArray(s.financeiro.lancamentos)?s.financeiro.lancamentos:[];data.financeiro.receitas=l.filter(x=>x.tipo==='receita'&&String(x.status).toLowerCase()==='pago').reduce((a,x)=>a+Number(x.valor||0),0);data.financeiro.despesas=l.filter(x=>x.tipo==='despesa'&&String(x.status).toLowerCase()==='pago').reduce((a,x)=>a+Number(x.valor||0),0);render()}catch(_){}});</script>
<script>
(function(){
"use strict";
window.addEventListener("message",event=>{
  const msg=event.data||{};
  if(msg.source!=="oficinaos-v700"||msg.type!=="STATE_CHANGED")return;

  const incoming=msg.payload&&msg.payload.state||{};
  const full=incoming.state&&typeof incoming.state==="object"?incoming.state:incoming;

  window.OFICINAOS_V700_STATE=full;
  window.OFICINA_STATE=full;

  window.dispatchEvent(new CustomEvent("oficinaos:v700-imported",{
    detail:full
  }));
});
})();
</script>
